<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>技術士総監 過去問解説アプリ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:#0059d1; --blue-lt:#e8effd; --blue-mid:#c2d4f8;
  --green:#1a7f4e; --green-lt:#e6f7ee; --green-bd:#99d4b8;
  --red:#c0392b; --red-lt:#fdecea; --red-bd:#e8a8a0;
  --amber:#b45309; --amber-lt:#fef3c7; --amber-bd:#f6cc7a;
  --grey-bg:#f2f4f8; --white:#ffffff; --border:#dde2ee;
  --text:#1c2033; --text-mid:#4a5170; --text-lite:#8990b0;
  --hdr-h1:52px; --hdr-h2:48px; --hdr-h3:48px; --hdr-total:148px;
  --font:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
}
body { font-family:var(--font); background:var(--grey-bg); color:var(--text); padding-top:var(--hdr-total); }
.header { position:fixed; top:0; left:0; right:0; z-index:1000; background:var(--white); box-shadow:0 2px 12px rgba(0,0,0,.10); }
.hrow-title { height:var(--hdr-h1); background:var(--blue); display:flex; align-items:center; padding:0 16px; gap:10px; }
.app-title { font-size:14px; font-weight:700; color:#fff; flex:1; letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.count-pill { font-size:11px; background:rgba(255,255,255,.2); color:#fff; border-radius:100px; padding:3px 12px; white-space:nowrap; flex-shrink:0; }
.count-pill b { font-weight:700; }
.hrow,.hrow-range { display:flex; align-items:center; padding:0 12px; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.hrow::-webkit-scrollbar,.hrow-range::-webkit-scrollbar { display:none; }
.hrow { height:var(--hdr-h2); border-bottom:1px solid var(--border); }
.hrow-range { height:var(--hdr-h3); }
.row-label { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text-lite); white-space:nowrap; flex-shrink:0; }
.chip,.rchip { font-size:12px; font-weight:600; padding:6px 14px; border-radius:100px; border:1.5px solid var(--border); background:var(--white); color:var(--text-mid); cursor:pointer; white-space:nowrap; flex-shrink:0; transition:background .13s,border-color .13s,color .13s,box-shadow .13s; -webkit-tap-highlight-color:transparent; user-select:none; line-height:1; }
.rchip { font-size:11px; padding:5px 13px; }
.chip:hover,.rchip:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-lt); }
.chip.active,.rchip.active { background:var(--blue); border-color:var(--blue); color:#fff; box-shadow:0 2px 8px rgba(0,89,209,.28); }
.container { max-width:760px; margin:0 auto; padding:20px 14px 72px; }
.empty { text-align:center; padding:64px 20px; color:var(--text-lite); font-size:13px; }
.card { background:var(--white); border-radius:10px; border:1.5px solid var(--border); box-shadow:0 1px 6px rgba(0,0,0,.07); margin-bottom:10px; overflow:hidden; transition:box-shadow .18s,transform .15s,border-color .18s; }
.card:hover { box-shadow:0 4px 18px rgba(0,0,0,.11); transform:translateY(-1px); }
.card.open { border-color:var(--blue); box-shadow:0 4px 18px rgba(0,89,209,.10); }
.card-head { display:flex; align-items:center; gap:10px; padding:13px 14px; cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none; transition:background .12s; }
.card-head:hover { background:#fafbff; }
.card.open .card-head { background:var(--blue-lt); }
.card-meta { flex:1; min-width:0; }
.card-id { font-size:11px; color:var(--text-lite); letter-spacing:.06em; margin-bottom:3px; }
.card-qrow { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.card-qnum { font-size:15px; font-weight:700; color:var(--text); }
.type-badge { font-size:10px; font-weight:700; letter-spacing:.06em; padding:2px 8px; border-radius:4px; border:1px solid; white-space:nowrap; }
.type-badge.correct   { background:var(--green-lt); color:var(--green); border-color:var(--green-bd); }
.type-badge.incorrect { background:var(--red-lt);   color:var(--red);   border-color:var(--red-bd); }
.type-badge.calc      { background:var(--amber-lt); color:var(--amber); border-color:var(--amber-bd); }
.ans-box { flex-shrink:0; }
.ans-circle { width:36px; height:36px; border-radius:8px; border:2px solid; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:800; line-height:1; }
.ans-circle.correct   { background:var(--green-lt); color:var(--green); border-color:var(--green-bd); }
.ans-circle.incorrect { background:var(--red-lt);   color:var(--red);   border-color:var(--red-bd); }
.ans-circle.calc      { background:var(--amber-lt); color:var(--amber); border-color:var(--amber-bd); }
.chevron { font-size:10px; color:var(--text-lite); transition:transform .22s ease; line-height:1; flex-shrink:0; }
.card.open .chevron { transform:rotate(180deg); color:var(--blue); }
.card-body { display:none; padding:14px 16px 16px; border-top:1.5px solid var(--border); background:#fafbff; animation:fadeIn .18s ease; }
.card.open .card-body { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.expl { font-size:13.5px; line-height:1.88; color:var(--text-mid); word-break:break-all; white-space:pre-wrap; }
.expl .hi { display:inline-flex; align-items:center; justify-content:center; background:var(--blue-lt); color:var(--blue); border:1px solid var(--blue-mid); border-radius:4px; padding:0 4px; font-size:12px; font-weight:700; min-width:20px; vertical-align:middle; }
.rich { display:flex; flex-direction:column; gap:14px; }
.rich-section { display:flex; flex-direction:column; gap:8px; }
.rich-lead { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--blue); padding-bottom:4px; border-bottom:1.5px solid var(--blue-mid); }
.formula-box { background:#f0f4ff; border:1.5px solid var(--blue-mid); border-radius:8px; padding:12px 16px; font-size:15px; font-weight:600; color:var(--text); text-align:center; font-family:"Georgia",serif; }
.frac { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 4px; }
.frac-n { border-bottom:1.5px solid var(--text); padding-bottom:2px; font-size:13px; }
.frac-d { padding-top:2px; font-size:13px; }
.expl-tbl { width:100%; border-collapse:collapse; font-size:13px; }
.expl-tbl th { background:#eef1f8; color:var(--text-mid); font-weight:700; padding:7px 10px; text-align:left; border:1px solid var(--border); font-size:12px; }
.expl-tbl td { padding:7px 10px; border:1px solid var(--border); color:var(--text-mid); vertical-align:middle; }
.expl-tbl .row-correct td { background:var(--green-lt); color:var(--green); font-weight:700; }
.step-list { display:flex; flex-direction:column; gap:8px; }
.step { display:flex; align-items:flex-start; gap:10px; background:#f7f8fc; border-radius:8px; padding:10px 12px; border:1px solid var(--border); }
.step-n { min-width:22px; height:22px; border-radius:50%; background:var(--blue); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.step div { font-size:13px; line-height:1.7; color:var(--text-mid); }
.step strong { color:var(--text); }
.rich-tip { display:flex; gap:10px; align-items:flex-start; background:var(--amber-lt); border:1.5px solid var(--amber-bd); border-radius:8px; padding:12px 14px; }
.tip-icon { font-size:18px; flex-shrink:0; line-height:1.4; }
.rich-tip div { font-size:13px; line-height:1.75; color:#78350f; }
.rich-tip strong { color:#92400e; }
#topBtn { position:fixed; bottom:24px; right:20px; width:42px; height:42px; background:var(--blue); color:#fff; border:none; border-radius:50%; font-size:17px; cursor:pointer; display:none; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(0,89,209,.38); transition:transform .15s; z-index:500; }
#topBtn.show { display:flex; }
#topBtn:hover { transform:translateY(-2px); }
@media (max-width:480px) {
  :root { --hdr-h1:46px; --hdr-h2:44px; --hdr-h3:44px; --hdr-total:134px; }
  .app-title { font-size:12px; } .card-qnum { font-size:14px; }
  .expl { font-size:13px; } .container { padding:14px 10px 60px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="hrow-title">
    <span class="app-title">技術士総監&nbsp; 択一式問題 解説アプリ</span>
    <span class="count-pill" id="countPill"><b>—</b> 問</span>
  </div>
  <div class="hrow" id="yearRow">
    <span class="row-label">年度</span>
    <button class="chip active" data-year="R7">R7</button>
    <button class="chip" data-year="R6">R6</button>
    <button class="chip" data-year="R5">R5</button>
    <button class="chip" data-year="R4">R4</button>
    <button class="chip" data-year="R3">R3</button>
    <button class="chip" data-year="R2">R2</button>
    <button class="chip" data-year="ALL">全年度</button>
  </div>
  <div class="hrow-range" id="rangeRow">
    <span class="row-label">範囲</span>
    <button class="rchip active" data-s="1"  data-e="8" >1〜8</button>
    <button class="rchip"        data-s="9"  data-e="16">9〜16</button>
    <button class="rchip"        data-s="17" data-e="24">17〜24</button>
    <button class="rchip"        data-s="25" data-e="32">25〜32</button>
    <button class="rchip"        data-s="33" data-e="40">33〜40</button>
    <button class="rchip"        data-s="1"  data-e="40">全問</button>
  </div>
</div>
<div class="container" id="app"></div>
<button id="topBtn" title="トップへ">↑</button>
<script>
const allData = [{"year":"R2","q_num":"1","id":1,"answer":"④","explanation":"パレート図：不備件数上位2項目（日付・口座番号）で全体の約80%を占める→重要問題の識別。①系統図は目的手段展開図、②連関図は因果関係図（管理図が正）、③管理図は工程安定性（散布図が正）、⑤ヒストグラムはデータ分布形状（特性要因図等が正）。","type":"correct"},{"year":"R2","q_num":"2","id":2,"answer":"①","explanation":"<div class=\"rich\">\n  <div class=\"rich-section\">\n    <div class=\"rich-lead\">NPVの基本公式</div>\n    <div class=\"formula-box\">\n      NPV = Σ <span class=\"frac\"><span class=\"frac-n\">CF<sub>t</sub></span><span class=\"frac-d\">(1+r)<sup>t</sup></span></span> − 初期投資\n    </div>\n    <table class=\"expl-tbl\">\n      <tr><th>記号</th><th>意味</th></tr>\n      <tr><td>CF<sub>t</sub></td><td>t年目のキャッシュフロー</td></tr>\n      <tr><td>r</td><td>割引率（本問は3%）</td></tr>\n      <tr><td>(1+r)<sup>t</sup></td><td>割引係数（現在価値に戻す係数）</td></tr>\n    </table>\n  </div>\n  <div class=\"rich-section\">\n    <div class=\"rich-lead\">割引係数（r=3%）</div>\n    <table class=\"expl-tbl\">\n      <tr><th>年</th><th>割引係数 1/(1.03)<sup>t</sup></th></tr>\n      <tr><td>1年目</td><td>0.9709</td></tr>\n      <tr><td>2年目</td><td>0.9426</td></tr>\n      <tr><td>3年目</td><td>0.9151</td></tr>\n    </table>\n  </div>\n  <div class=\"rich-section\">\n    <div class=\"rich-lead\">各投資案のNPV比較</div>\n    <table class=\"expl-tbl\">\n      <tr><th>投資案</th><th>NPV（万円）</th><th></th></tr>\n      <tr class=\"row-correct\"><td><strong>A</strong></td><td><strong>≒ 455.78</strong></td><td>✔ 最大・正答</td></tr>\n      <tr><td>E</td><td>≒ 454.77</td><td></td></tr>\n      <tr><td>B</td><td>≒ 450.69</td><td></td></tr>\n      <tr><td>C</td><td>≒ 450.03</td><td></td></tr>\n      <tr><td>D</td><td>≒ 448.32</td><td>最小</td></tr>\n    </table>\n  </div>\n  <div class=\"rich-tip\">\n    <span class=\"tip-icon\">💡</span>\n    <div><strong>なぜAが最大か？</strong><br>\n    同じ合計CFでも<strong>早い年度に多く受け取る投資案ほどNPVが大きくなります</strong>。<br>\n    1年目の100万円は現在価値97万円、3年目の100万円は91万円と目減りするため、早期回収型が有利。</div>\n  </div>\n</div>","type":"calc","rich":true},{"year":"R2","q_num":"3","id":3,"answer":"②","explanation":"CPMはクリティカルパスを特定するスケジュール管理手法。「プロジェクトの作業を階層的に分解したもの」はWBS（作業分解構成図）の説明で誤り。","type":"incorrect"},{"year":"R2","q_num":"4","id":4,"answer":"③","explanation":"ゲーム理論は意思決定主体が複数存在する状況を数学的に取り扱う方法論であり非協力ゲームと協力ゲームに大きく分類される。①整数条件追加で難化、②パレート最適解は複数存在、④デルファイ法は個別アンケートの繰り返し、⑤階層化分析（AHP）はクラスター分析と異なる。","type":"correct"},{"year":"R2","q_num":"5","id":5,"answer":"②","explanation":"調達リードタイム・発注間隔の短縮は平時の効率化であり、災害等によるSCM途絶時のロバストネスやレジリエンス向上に直接貢献する事前方策としては最もそぐわない。①情報把握・③複数サプライヤ・④支援体制・⑤標準化はいずれも有効な事前方策。","type":"incorrect"},{"year":"R2","q_num":"6","id":6,"answer":"⑤","explanation":"直接労務費差異=標準(500,000)-実際(1,200×400=480,000)=+20,000円（有利差異）。「-20,000円（不利差異）」は誤り。①標準両費500,000円✓、②数量差異-50,000円✓、③賃率差異-80,000円✓、④直接材料費差異+5,000円✓。","type":"incorrect"},{"year":"R2","q_num":"7","id":7,"answer":"④","explanation":"間接法CF計算書の営業CF：税引後利益から出発し現金支出を伴わない費用（減価償却費）を加算（加え戻す）。①借入・返済はB/S変動でP/Lには記載されない、②現金出入りはCF計算書、③CF計算書は現金増減を記載、⑤フリーCF=営業CF+投資CF（財務CFは含まない）。","type":"correct"},{"year":"R2","q_num":"8","id":8,"answer":"③","explanation":"改善活動=設備を変える・良くする（保全予防+改良保全）、維持活動=現状を保つ（事後保全+予防保全）。予知保全は状態監視で最適時期に保全→維持活動に分類。","type":"correct"},{"year":"R2","q_num":"9","id":9,"answer":"①","explanation":"男女雇用機会均等法：性別を理由とした異なる定年の設定は禁止。厚生年金支給年齢の男女差を理由としても認められない。②65歳以上はR2改正で雇用保険加入対象、③年齢上限設定は原則禁止、④継続雇用は事業主が定めた基準に従う、⑤グループ子法人での継続雇用は可。","type":"correct"},{"year":"R2","q_num":"10","id":10,"answer":"⑤","explanation":"面接指導義務は「高ストレス者として選定され、面接指導が必要とされた者からの申出があった場合」に限定。選定されなかった者への申出に応じる法的義務はない。","type":"incorrect"},{"year":"R2","q_num":"11","id":11,"answer":"②","explanation":"障害者雇用促進法の対象障害者：身体・知的・精神障害者（精神は手帳保有者のみ）。①障害者専用求人は差別に当たらない（合理的配慮の範囲内）、③納付金制度は100人超企業が対象、④国・地方公共団体にも法定雇用率あり、⑤週20時間以上パートは算入。","type":"correct"},{"year":"R2","q_num":"12","id":12,"answer":"②","explanation":"ダイバーシティ・マネジメントは業績・生産性指標と連関させて推進することが重要（経営戦略として位置付ける）。「連関させることは避けるべき」は逆の記述で誤り。","type":"incorrect"},{"year":"R2","q_num":"13","id":13,"answer":"⑤","explanation":"ジョブローテーションの効果：組織全体の業務理解促進・環境変化への適応力向上。①長期雇用正職員向き（×有期雇用）、②適材適所とは必ずしも一致しない、③ジェネラリスト育成向き（×スペシャリスト）、④職務給制度と相性が悪い。","type":"correct"},{"year":"R2","q_num":"14","id":14,"answer":"③","explanation":"技能実習法第3条：技能実習は労働力の需給調整の手段として行われてはならない。①計画は個人単位（×グループ）、②試験合格が要件、④最低賃金法が適用される、⑤最長5年（×10年）。","type":"correct"},{"year":"R2","q_num":"15","id":15,"answer":"①","explanation":"ア:社外教育機関→OFF-JT、イ:職場での上司指導下実務→OJT、ウ:職場での業務経験→OJT、エ:職務時間外本人主体学習→自己啓発、オ:社内研修→OFF-JT。","type":"correct"},{"year":"R2","q_num":"16","id":16,"answer":"④","explanation":"A:コンピテンシー=高業績者の業績達成能力→(イ)、B:サーバントリーダーシップ=まず奉仕→後に導く→(イ)、C:ハロー効果=一点の優秀さが全体評価に影響する評価誤差→(ア)、D:コンテント=what、プロセス=how→(ア)。A(イ)B(イ)C(ア)D(ア)→④。","type":"correct"},{"year":"R2","q_num":"17","id":17,"answer":"⑤","explanation":"実用新案登録出願件数は特許出願件数の1/20〜1/30程度で推移。「ほぼ1/6」は実態と大きく乖離した誤り。①PCT国際出願は増加（2018年過去最高）、②特許は漸減→横ばい、③意匠はほぼ横ばい、④商標は増加傾向。","type":"incorrect"},{"year":"R2","q_num":"18","id":18,"answer":"①","explanation":"航空法上の「目視による常時監視」は操縦者自身が肉眼で直接監視することが基本。双眼鏡使用はR2年時点では目視監視に含まれない。②屋内は規制対象外、③農薬散布は承認必要、④電波法の規制対象、⑤「他の条件によらず」は過大な表現で誤り。","type":"correct"},{"year":"R2","q_num":"19","id":19,"answer":"②","explanation":"MTBF=(総稼働時間-総修理時間)÷故障件数。A=(1,093,800-121,040)/987≒985.6時間（カタログ値下回る）、B=(1,148,300-114,720)/1,283≒805.6時間（カタログ値下回る）。「AはカタログMTBF値を上回る」という②が不適切。","type":"incorrect"},{"year":"R2","q_num":"20","id":20,"answer":"④","explanation":"ア:一定期間ごとにずらしながら平均→移動平均、イ:基準時点=100の相対値→指数化、ウ:2変数の関係を散布図で→相関分析、エ:説明変数xで目的変数yを予測する式→回帰分析。","type":"correct"},{"year":"R2","q_num":"21","id":21,"answer":"③","explanation":"Society5.0では、IoT等でフィジカル空間のデータを収集しサイバー空間でAIが解析→最適化された情報・サービスをフィジカル空間の人間に提供する仕組み。「人間が自らサイバー空間にアクセスして解析する」はSociety4.0（情報社会）的な描写で誤り。","type":"incorrect"},{"year":"R2","q_num":"22","id":22,"answer":"②","explanation":"オプトイン手続（本人の事前同意）により第三者提供する者に個人情報保護委員会への届出義務はない。届出義務があるのはオプトアウト手続（本人同意なしに第三者提供する場合）を利用する事業者。","type":"incorrect"},{"year":"R2","q_num":"23","id":23,"answer":"①","explanation":"機械学習のデータ活用プロセス：ア:学習（学習用データでモデルを作成）、イ:前処理（クレンジング等）、ウ:モデル（学習により作成）、エ:推論（作成されたモデルを適用して識別・予測）。","type":"correct"},{"year":"R2","q_num":"24","id":24,"answer":"③","explanation":"公開鍵暗号方式では、暗号化に使う「公開鍵」は「受信者が配布する鍵」。送信者は「受信者の公開鍵」で暗号化し、受信者は「自身の秘密鍵」で復号。「送信者が生成した公開鍵」で暗号化するのは誤り。","type":"incorrect"},{"year":"R2","q_num":"25","id":25,"answer":"④","explanation":"システム安全工学手法の組合せ問題。正答④：A→ア（VTA）、B→イ（FTA）、C→エ（FMEA）、D→ウ（ETA）。\n\n【各手法の解説と暗記のコツ】\n\n■ A：VTA（Variation Tree Analysis／変動木解析）→ ア\n「通常状態からの逸脱・変動」を時間軸に沿ってツリー状に分析し、事故につながった逸脱の連鎖を追う手法。\n🔑 暗記：「V（変動）を時間軸の木（Tree）で追う」→ 時系列が特徴\n\n■ B：FTA（Fault Tree Analysis／故障の木解析）→ イ\n「頂上事象（望ましくない結果）」を頂点に置き、その原因をAND/ORゲートでツリー状に展開する演繹的手法。\n🔑 暗記：「F（故障）を木の上（Top）から掘り下げる」→ トップダウン・演繹的\n\n■ C：FMEA（Failure Mode and Effects Analysis／故障モード影響解析）→ エ\n各構成要素の「故障モード（どう壊れるか）」を列挙し、それがシステム全体に与える影響を帰納的に分析。\n🔑 暗記：「F（故障）M（モード）を部品から積み上げる」→ ボトムアップ・帰納的\n🔑 語呂：「エフエム（FM）ラジオを部品から組み立てる」\n\n■ D：ETA（Event Tree Analysis／事象の木解析）→ ウ\n「初期事象（起点となる異常）」から出発し、各安全系が機能するか否かの分岐を樹形図で展開して最終結果を評価。\n🔑 暗記：「E（事象）を起点に木が広がる（右方向）」→ 左から右へ展開\n\n【FTAとETAの違い】\n・FTA：結果（トップ事象）→ 原因を遡る（演繹）\n・ETA：原因（初期事象）→ 結果を追う（帰納）\n→ 「F（Fault）は上から、E（Event）は下（起点）から」と覚えると混乱しない。","type":"correct"},{"year":"R2","q_num":"26","id":26,"answer":"①","explanation":"労働者派遣事業と請負では安全衛生の責任主体が異なる（派遣先、派遣元、注文主の責任分担が異なる）。正確な記述。②元方事業者は関係請負人の労働者への指導もできる（むしろ義務）、③派遣労働者は派遣先で算入、⑤特別教育は派遣先の義務。","type":"correct"},{"year":"R2","q_num":"27","id":27,"answer":"⑤","explanation":"IoT機器はネットワークに接続されているため、サイバー攻撃の影響は他の関連機器・システム・サービスに波及するリスクが高い。「影響が当該機器にとどまる」は誤り。","type":"incorrect"},{"year":"R2","q_num":"28","id":28,"answer":"④","explanation":"停電発生確率：主要電源3系統すべて停止(p³)×緊急電源2台で停電を回避できない確率{1-(1-q)²}=p³{1-(1-q)²}→④。","type":"correct"},{"year":"R2","q_num":"29","id":29,"answer":"③","explanation":"リスクコミュニケーションの目的は意見・価値観の「一致」や「1つの結論の導出」ではなく、多様なステークホルダー間での相互理解・情報共有・対話の促進にある。「一致させる」という目的設定は誤り。","type":"incorrect"},{"year":"R2","q_num":"30","id":30,"answer":"⑤","explanation":"リスク認知バイアス5種：カタストロフィー→ア（巨大被害を過大視）、バージン→エ（未経験事象を合理的評価できない）、正常性→イ（異常を正常とみなす）、楽観主義→オ（明るい側面から見る）、ベテラン→ウ（経験豊富で異常を過小評価）→⑤。","type":"correct"},{"year":"R2","q_num":"31","id":31,"answer":"②","explanation":"安全文化では「報告する文化（Reporting Culture）」=自己のエラーを自ら報告しやすい雰囲気が重要。「厳格な検査や監査による他者の指摘を重視する雰囲気」は報告する文化と逆方向の考え方で誤り。","type":"incorrect"},{"year":"R2","q_num":"32","id":32,"answer":"①","explanation":"特定保守製品（9品目）の一つ：ビルトイン式電気食器洗機。その他の特定保守製品：屋内式ガス瞬間湯沸器・ガスふろがま・石油ふろがま・石油給湯機・FF式石油温風暖房機・浴室用電気乾燥機・屋外式瞬間湯沸器等。④開放式石油温風暖房機はFF式（強制排気）ではないため対象外。","type":"correct"},{"year":"R2","q_num":"33","id":33,"answer":"③","explanation":"気候変動適応計画は「適応策」に関する計画。「温室効果ガスの排出削減目標（緩和策）」は地球温暖化対策計画に規定される。2つは別の計画であり「唯一の総合計画」かつ「排出削減目標を含む」という記述は誤り。","type":"incorrect"},{"year":"R2","q_num":"34","id":34,"answer":"③","explanation":"ワシントン条約（CITES）・特定外来生物法・生物多様性に関する問題。正答③。\n\n①種の保存法の対象種とレッドリスト掲載種は必ずしも一致しない（レッドリストは絶滅リスク評価であり法的保護とは別）。誤り。\n\n②ラムサール条約の対象湿地には、人工湿地（水田・養魚池等）も含まれる。「天然のみ」とする記述は誤り。\n\n③【正答】ワシントン条約（CITES）では附属書の種別に規制レベルが異なる（附属書Ⅰ＝商業取引原則禁止、附属書Ⅱ＝条件付き可、附属書Ⅲ＝各国保護要請）。条件が整えば学術・商業目的の取引も認められる場合があり、正しい記述。\n\n④里山の管理放棄は、従来その環境に適応していた生物の生息環境喪失につながり、生物多様性を低下させる可能性がある。誤り。\n\n⑤【修正済・正確な解説】\n特定外来生物法の「個体」とは生きているものに限られる（死体・はく製・標本等は含まない）。\nただし卵・種子・幼虫など繁殖能力のあるものは「個体」に含まれる。\n\n▼ 外来生物法で禁止されている主な行為（生きた個体が対象）：\n・輸入\n・飼養・栽培・保管・運搬\n・野外への放出・植栽・播種\n・譲渡・販売・贈与\n\n▼ 死体・加工品（はく製・標本・毛皮など）は規制対象外。\n→ 選択肢⑤が「死んだ個体は含まれない」とする記述であれば、これは正しい内容（規制対象外）。\n前回の解説「死んだ個体も含まれる」は誤りであり訂正します。","type":"correct"},{"year":"R2","q_num":"35","id":35,"answer":"⑤","explanation":"プラスチック資源循環戦略は国内での3R促進・適正処理が基本方針。廃プラスチックをアジア各国に輸出して処理するグローバル戦略は戦略の主旨に反する（廃棄物不法輸出問題も生じうる）。","type":"incorrect"},{"year":"R2","q_num":"36","id":36,"answer":"①","explanation":"リサイクル関連法に関する問題。正答①。\n\n①【正答】容器包装リサイクル法には、消費者の分別排出・市町村の分別収集・特定の容器を製造する事業者に対する一定量の再商品化についての定めがある。3者の役割分担が法の根幹であり、正しい記述。\n\n②家電リサイクル法（特定家庭用機器再商品化法）の対象はエアコン・テレビ・冷蔵庫冷凍庫・洗濯機衣類乾燥機の4品目（計6種）。パソコン・カメラは対象外のため、誤り。\n\n③食品リサイクル法に基づく基本方針では「事業系の食品ロスを2030年度までにゼロとする目標」は掲げていない。食品ロス削減は別途「食品ロス削減推進法」で扱われており、「ゼロ」という絶対目標は法定されていない。誤り。\n\n④建設リサイクル法の特定建設資材は「コンクリート」「コンクリート及び鉄から成る建設資材」「木材」「アスファルト・コンクリート」の4種類。建設機械で使用済みの廃油は含まれない。誤り。\n\n⑤【正確な解説】自動車リサイクル法では、自動車破砕残さ・フロン類・エアバッグの3品目を「特定再資源化等物品」と定め、引き取り・リサイクルの義務を負うのは「自動車製造業者等（メーカー・輸入業者）」である。これは正しい内容のため、誤りではない。\n→ ただし正答は①なので、この問題は「最も適切なもの」を選ぶ問題（Pattern A）。①の記述が法律の趣旨に最も合致しており正答。⑤も事実として誤りではないが、①がより直接的・正確に法の規定を表している。","type":"correct"},{"year":"R2","q_num":"37","id":37,"answer":"⑤","explanation":"気候変動の長期トレンド：無降水日の年間日数は「明確な減少傾向」が確認されているとは言えない（地域差があり単純に「減少している」とは言えない）。①年平均気温↑（世界平均より大）、②猛暑日↑、③冬日↓、④短時間強雨↑は適切な記述。","type":"incorrect"},{"year":"R2","q_num":"38","id":38,"answer":"④","explanation":"第五次環境基本計画は「環境・経済・社会の統合的向上」を目指した分野横断的な「重点戦略」を設定。「特定分野の課題を直接的に解決することに比重を置いた分野別重点戦略」という記述は誤り。","type":"incorrect"},{"year":"R2","q_num":"39","id":39,"answer":"③","explanation":"環境影響評価準備書には：①調査結果の概要、②予測及び評価の結果、③環境の保全のための措置、④環境影響の総合的な評価の記載が義務付けられている。①配慮書に費用対効果は含まれない、②方法書→スコーピング（×スクリーニング）、⑤すべての保全措置が事後調査対象ではない。","type":"correct"},{"year":"R2","q_num":"40","id":40,"answer":"③","explanation":"トリプルボトムライン（TBL）の3つの柱は「経済（Profit）・環境（Planet）・社会（People）」。「人的資源」という表現は「社会（People）」の観点を正確に表していない（不正確な表現で誤り）。①ISO26000✓、②エコアクション21✓、④ESG投資✓、⑤環境会計✓。","type":"incorrect"},{"year":"R3","q_num":"1","id":1,"answer":"⑤","explanation":"政策評価・投資評価の各手法に関する問題。正答⑤：回収期間法では投資回収後のキャッシュ・フローは考慮されない。これは回収期間法の本質的な限界であり正しい記述。①費用便益分析は外部経済・外部不経済を含む社会的費用・便益を対象とするが、「定量的評価手法の総称」という表現は誤り（費用便益分析は特定の手法）。②費用効用分析では効果はQALY等の効用指標で測定されるが「すべて効用関数で貨幣価値に換算」は誤り。③アウトカム指標は政策の最終的な成果（例：死亡率低下）を示すものであり「アウトプット指標を貨幣価値に換算したもの」は誤り。④IRRとNPVの大小関係は必ずしも一致しない（複数のIRRが存在する場合等）。","type":"correct"},{"year":"R3","q_num":"2","id":2,"answer":"④","explanation":"PFI法に基づく事業に関する問題。正答④：コンセッション方式では、施設の所有権を公共主体が保有したまま、民間事業者に施設の運営権（コンセッション）が設定される。①VFM（バリュー・フォー・マネー）とは従来型公共事業に比べたPFI事業の財政支出の削減額のことであり「事業期間全体を通じた公的財政負担の見込額の現在価値」は誤り。②BTO方式では民間事業者が整備・所有し、完成後に所有権を公共主体に移転した上でサービス提供するもの。「所有したままサービス提供」は誤り。③BOT方式では施設完成後も所有権は民間事業者に留まり、事業終了後に公共主体に移転するもので「完成直後に移転」は誤り。⑤PFI事業件数については、令和元年以降も増加傾向であり「減少傾向」は誤り。","type":"correct"},{"year":"R3","q_num":"3","id":3,"answer":"①","explanation":"品質管理の統計的手法に関し最も不適切なものを選ぶ問題。不適切な選択肢①：管理図の管理限界は、製品規格値ではなくデータのばらつき（統計的計算）に基づいて設定する。規格値（上限・下限）と管理限界は別概念であり、規格値に設定することは誤りである。管理限界は通常、平均±3σで設定される。","type":"incorrect"},{"year":"R3","q_num":"4","id":4,"answer":"③","explanation":"PERT（作業見直し前後の最短所要日数）の計算問題。【見直し前のクリティカルパス計算】A→C→E：5+5+4=14日、B→D→E：3+8+4=15日、B→F→G：3+6+8=17日 → CP=17日。【見直し後のクリティカルパス計算】A→C→E：5+5+4=14日、B→D→E：3+8+4=15日、B→F1→G：3+3+8=14日、B→F1→F2：3+3+3=9日 → CP=15日（B→D→E経路）。短縮日数＝17−15＝2日。よって正答③「2日」。","type":"calc"},{"year":"R3","q_num":"5","id":5,"answer":"②","explanation":"サプライチェーンマネジメント（SCM）と生産方式に関する問題。正答②：顧客からの受注後に、完成在庫から出荷するか（MTS）、組み立てて出荷するか（ATO）、設計して生産するか（ETO）によってSCMの形態が変わるという記述は正しい。①SCMの管理対象にはサービスも含まれるため「サービスは含まない」は誤り。③TOCでは制約条件（ボトルネック）工程の能力を高めることがシステム全体のパフォーマンス向上に直結し、制約条件以外の工程の能力を高めても改善につながらないとされる。④プル型は需要実績に基づく生産方式であり、「需要予測に基づく」のはプッシュ型の説明。⑤かんばん方式では「引き取りかんばん」が部品の運搬を指示し、「生産指示かんばん」は生産を指示するものであり、部品容器から外した生産指示かんばんで運搬を指示するは誤り。","type":"correct"},{"year":"R3","q_num":"6","id":6,"answer":"⑤","explanation":"損益分岐点分析の計算問題。【基本データ】販売価格30,000円、販売量800個、変動費10,000円/個、固定費10,000,000円。限界利益率＝(30,000−10,000)/30,000＝20,000/30,000≒66.7%。正答⑤：限界利益率は66.7%となる（正しい）。①変動費5%削減→変動費9,500円/個、BEP売上高=10,000,000/(1−9,500/30,000)=10,000,000/0.6833≒14,634,000円（22,800,000円にはならない）。②固定費1,000,000円増加→限界利益は変化しないが限界利益額=20,000×800=16,000,000円（5,000,000円は誤り）。③販売価格8%値下げ→27,600円、販売量20%増加→960個、営業利益=(27,600−10,000)×960−10,000,000=16,896,000−10,000,000=6,896,000円（8,496,000円ではない）。④BEP売上高=10,000,000/0.667≒15,000,000円、予想売上高=30,000×800=24,000,000円、比率=15,000,000/24,000,000≒62.5%（83.3%ではない）。","type":"calc"},{"year":"R3","q_num":"7","id":7,"answer":"③","explanation":"財務諸表（間接法キャッシュ・フロー計算書）に関し最も不適切なものを選ぶ問題。不適切な選択肢③：間接法による営業活動のキャッシュ・フローでは、売上債権の増加はキャッシュの流出（マイナス）を意味するため「マイナスの調整」を行う。また仕入債務の増加はキャッシュの節約（プラス）となるため「プラスの調整」を行う。本問は「売上債権増加→プラス調整、仕入債務増加→マイナス調整」と逆に記載されており不適切。","type":"incorrect"},{"year":"R3","q_num":"8","id":8,"answer":"②","explanation":"設備管理に関する問題。正答②：一般に設備保全活動に必要な保全費には、設備の新増設・更新・改造などの固定資産に繰り入れるべき支出は含まれない。これは資本的支出であり、費用（保全費）とは区別される正しい記述。①設備のライフサイクルコストには廃却費も含まれるため「廃却費は含まれない」は誤り。③設備修理中の機会損失費は活動基準原価計算（ABC）ではなく、一般に機会費用として別途算出される。④価値分析（VA）は設備投資案の評価よりも製品・部品の価値向上に用いられるもの（経済計算手法としては主にDCF法等が用いられる）。⑤絶対的劣化による取替えを「設備更新」、相対的劣化による取替えを「設備取替」というのは逆であり誤り。","type":"correct"},{"year":"R3","q_num":"9","id":9,"answer":"②","explanation":"労使関係に関する問題。正答②：団体交渉では、賃金・労働時間・休日などの労働条件のほか、団体交渉の手続・組合活動における施設利用なども交渉事項となり得るという記述は正しい。①パートタイム労働者も労働組合に加入することができるため誤り。③労働委員会の構成は使用者委員・労働者委員各同数に加え「公益委員」も含まれるため「半数ずつ」は誤り。④労働委員会のあっせんは非公開で行われるため「公開で行う」は誤り。⑤調停案の受諾は任意であり、労使いずれも受け入れを強制されない。","type":"correct"},{"year":"R3","q_num":"10","id":10,"answer":"③","explanation":"労働者派遣法に関し最も不適切なものを選ぶ問題。不適切な選択肢③：派遣先の労使協定（三六協定）の範囲内で時間外・休日労働を行わせることができるのは誤り。時間外・休日労働については、派遣元の労使協定に基づき行われるものであり、派遣先の労使協定範囲内ではなく派遣元の協定が適用される。","type":"incorrect"},{"year":"R3","q_num":"11","id":11,"answer":"②","explanation":"育児・介護休業法に関する問題。正答②：労働者は、要介護状態にある対象家族を介護するために、対象家族1人につき通算93日まで、3回まで分割して介護休業を取得することができるという記述は正しい。①介護休業の対象家族には配偶者の祖父母は含まれない（配偶者、父母、子、祖父母、兄弟姉妹、孫、配偶者の父母）。④介護休業は要件を満たす労働者が申し出た場合、事業主は原則拒否できない。⑤介護休業取得期間は年次有給休暇の算定上、出勤したものとみなされる。","type":"correct"},{"year":"R3","q_num":"12","id":12,"answer":"②","explanation":"職場におけるセクシャルハラスメント指針に関し最も不適切なものを選ぶ問題。不適切な選択肢②：「労働者の意に反する性的な言動への対応により不利益を受けること」は対価型セクシャルハラスメントの説明である。環境型セクシャルハラスメントとは、性的な言動によって就業環境が不快・不利益なものとなり労働者の能力発揮に悪影響を与えるものを指す。解雇・降格・減給等の不利益は「対価型」の特徴であり、「環境型」の定義としては不適切。","type":"incorrect"},{"year":"R3","q_num":"13","id":13,"answer":"③","explanation":"組織文化に関する問題。正答③：組織文化には、組織のメンバーにとって当然のこととみなされる前提や仮定（基本的仮定）も含まれるという記述は正しい（シャインの組織文化の3層モデルにおける最深層）。①組織文化は公式の決まり・規則ではなく、メンバーが共有する非公式の価値観・信念・行動様式である。②オフィス環境や服装などの表層的なもの（人工物）も組織文化の一部を構成する。④組織文化は長年の共有経験の産物であり、環境変化への適応は困難で時間がかかる（文化の粘着性）。⑤1つの企業でも部門ごとに異なるサブカルチャーが形成されることがある。","type":"correct"},{"year":"R3","q_num":"14","id":14,"answer":"①","explanation":"労働分配率・労働生産性に関する問題。正答①：労働分配率は、景気拡大局面では低下し、景気後退局面では上昇するという特徴がある。これは好況時に利益が増加して分配率が下がり、不況時に売上が落ちても人件費が維持されるためであり正しい記述。②資本金規模が大きい（1億円以上）企業ほど労働分配率が低い傾向があるとされており「1千万円以上1億円未満の企業の方が低い」は誤り。③2019年度の雇用者報酬の国民所得比は50%を超えているため誤り。④2018年の主要産業の労働生産性では宿泊・飲食サービス業は製造業より低い。⑤G7参加国中、2019年の1人当たり名目GDPで日本は下位グループに位置しており「2番目」は誤り。","type":"correct"},{"year":"R3","q_num":"15","id":15,"answer":"④","explanation":"メンター制度に関する問題。正答④：メンター制度を導入することにより、女性の活躍推進を促す効果も期待されるという記述は正しい。①メンタリング開始に当たっては、メンター・メンティの双方に事前研修を行うことが一般的。②メンターはメンティの直属の上司以外が望ましい（利害関係のない斜めの関係が効果的）。③メンタリングは就業時間内外どちらでも行われる。⑤メンタリングで話し合われた内容は守秘義務があり、人事担当部局への報告は望ましくない。","type":"correct"},{"year":"R3","q_num":"16","id":16,"answer":"①","explanation":"職能別組織と事業部制組織の優位性比較の問題。正答①：(ア)専門知識・経験の蓄積→職能別組織が優位、(イ)活動規模拡大に伴う単位コスト低下（規模の経済）→職能別組織が優位、(ウ)事業環境変化への迅速な対応→事業部制組織が優位（権限の分散）、(エ)次世代経営者の育成→事業部制組織が優位（擬似的な経営経験が得られる）。よって組合せは「職能別・職能別・事業部制・事業部制」で①が正答。","type":"correct"},{"year":"R3","q_num":"17","id":17,"answer":"①","explanation":"機械学習モデルの評価指標（混同行列）の計算問題。【元データ】4,500個：真陽性30、偽陰性20、偽陽性70、真陰性4,380。正解率=(30+4,380)/4,500=4,410/4,500≒97.98%。適合率=30/(30+70)=30/100=30%。再現率=30/(30+20)=30/50=60%。F値=2×(0.30×0.60)/(0.30+0.60)=0.36/0.90=40%。【20個追加】すべて陰性を陽性と予測：偽陽性+20、真陰性は変化なし。合計4,520個。正解率=(30+4,380)/4,520=4,410/4,520≒97.57%（低下）。適合率=30/(30+70+20)=30/120=25%（低下）。再現率=30/50=60%（変化なし）。F値=2×(0.25×0.60)/(0.25+0.60)=0.30/0.85≒35.3%（低下）。よって正答①：正解率・適合率・F値は小さくなり、再現率は変化しない。","type":"calc"},{"year":"R3","q_num":"18","id":18,"answer":"④","explanation":"改正個人情報保護法に関し最も不適切なものを選ぶ問題。不適切な選択肢④：「個人データ」とは個人情報データベース等を構成する個人情報をいうが、市販の電話帳や住宅地図に含まれる個人情報は、体系的に検索できる状態にあれば個人データに該当し得るものの、一般的な市販の電話帳・住宅地図の掲載情報が「個人データ」に該当するかは運用上の解釈が必要。しかし本問の要点は、個人情報取扱事業者の定義に関して、改正法では国の機関・地方公共団体なども個人情報取扱事業者と同等の義務を負う扱いとなったため、「国の機関・地方公共団体等は含まれない」（選択肢③）の方が典型的な不適切記述。正答④の理由は、市販の電話帳・住宅地図の情報は個人情報データベース等として管理されていれば個人データに該当するが、単に個人情報が掲載されていることをもって個人データとするのは過大な解釈であり不適切。","type":"incorrect"},{"year":"R3","q_num":"19","id":19,"answer":"④","explanation":"画像認識に関し最も不適切なものを選ぶ問題。不適切な選択肢④：画像認識に使用できるクラウドサービスは既に多数提供されており（AWS Rekognition、Google Cloud Vision API、Azure Computer Vision等）、「いまだ提供されていない」は明らかに誤りであり不適切。","type":"incorrect"},{"year":"R3","q_num":"20","id":20,"answer":"③","explanation":"Web会議サービスのセキュリティに関し最も不適切なものを選ぶ問題。不適切な選択肢③：通信路が安全でない場合にリスクが高まることは正しいが、「機密性の低い内容に限った会議であってもエンドツーエンド暗号化が必須」とするのは過大な要求であり不適切。機密性の低い会議においては通信路暗号化（TLS等）で十分な場合もあり、エンドツーエンド暗号化が常に必須とは言えない。","type":"incorrect"},{"year":"R3","q_num":"21","id":21,"answer":"②","explanation":"統計分析に関し最も不適切なものを選ぶ問題。不適切な選択肢②：相関分析は変数間の関連の強さを測るものであり、因果関係を前提とするものではない。「分析者が変数間の因果関係を仮定し、説明変数が被説明変数に与える効果を分析する」のは回帰分析の説明である。相関分析では因果の方向性を特定できず、あくまで相関係数により線形関係の強さを示すのみ。","type":"incorrect"},{"year":"R3","q_num":"22","id":22,"answer":"③","explanation":"インターネット上のネット炎上に関し最も不適切なものを選ぶ問題。不適切な選択肢③：若年層のテレビ・新聞離れによりネット炎上がマスメディアで認知される割合が低いとは言えず、実際にはネット炎上がテレビ・新聞でも大きく報道されるケースが多い。ネット炎上は必ずしもソーシャルメディアのみで完結せず、マスメディアにも広く伝播・報道されることがある。","type":"incorrect"},{"year":"R3","q_num":"23","id":23,"answer":"④","explanation":"クラウドコンピューティングに関し最も不適切なものを選ぶ問題。不適切な選択肢④：電子メール・グループウェアなどのアプリケーション機能をネットワーク経由で提供するのはSaaS（Software as a Service）であり、PaaS（Platform as a Service）の説明として不適切。PaaSはアプリケーション開発のためのプラットフォーム（OS、ミドルウェア、開発環境等）を提供するサービス。","type":"incorrect"},{"year":"R3","q_num":"24","id":24,"answer":"①","explanation":"多要素認証に関し最も不適切なものを選ぶ問題。多要素認証の3要素は「知識（知っていること）」「所持（持っているもの）」「生体（身体的特徴）」。不適切な選択肢①：「パスワード＋秘密の質問への答え」は、どちらも「知識要素」のみの組合せであり、異なる要素を組み合わせる多要素認証には該当しない。②OTPトークン（所持）＋パスワード（知識）は多要素認証。③ICカード（所持）＋指紋（生体）は多要素認証。④音声（生体）＋パスフレーズ（知識）は多要素認証。⑤パスフレーズ（知識）＋ICカード（所持）は多要素認証。","type":"incorrect"},{"year":"R3","q_num":"25","id":25,"answer":"③","explanation":"消費者安全に関し最も不適切なものを選ぶ問題。不適切な選択肢③：消費者安全法では、都道府県は消費生活センターを設置するよう努めるものとされており（努力義務）、国民生活センターは独立行政法人として設置されている。「都道府県に国民生活センター、市町村に消費生活センターを設置しなければならない」という義務的規定はなく、正確な規定と異なり不適切。","type":"incorrect"},{"year":"R3","q_num":"26","id":26,"answer":"④","explanation":"リスクアセスメント実施時の行動に関する問題。正答④：リスクの見積もりに当たり、負傷や疾病の重篤度については負傷や疾病の種類にかかわらず、負傷や疾病による休業日数等を尺度として使用したという記述は適切（重篤度と発生可能性の積でリスクを評価する手法に合致）。①一時的な作業に使用する仮設備もリスクアセスメントの対象に含める必要があるため「除く」は不適切。②検討チームから作業内容を詳しく把握している職長等を外すと、現場の実態把握が不十分になるため不適切。③建設物の解体時もリスクアセスメントの実施が必要。⑤リスク低減措置の優先順位は、ア→オ→エ→ウ→イ（法定事項→設計段階→工学的→管理的→個人用保護具）の順が正しく、本問の順序は誤り。","type":"correct"},{"year":"R3","q_num":"27","id":27,"answer":"②","explanation":"事業場の事故・災害未然防止に関し最も不適切なものを選ぶ問題。不適切な選択肢②：ツールボックスミーティング（TBM）とは、作業開始前に作業チームのメンバーが集まり、その日の作業内容・危険ポイント・安全対策を確認する短時間の安全ミーティングのことである。「使用する道具に係る潜在的危険性を相互に指摘し、道具に起因する事故を防止する取組」という限定的な説明は不適切（道具だけでなく作業全般の危険を確認するもの）。","type":"incorrect"},{"year":"R3","q_num":"28","id":28,"answer":"④","explanation":"労働安全衛生法の安全管理者等の配置要件に関する問題。各空欄を埋める組合せ問題。(ア)施行令第2条第1号の業種：製造業、電気業、ガス業等（危険業種）。(イ)施行令第2条第2号の業種：林業、鉱業、建設業等。(ウ)事業者が選任するのは「総括安全衛生管理者」。(エ)1,000人以上で追加配置が必要なのは「産業医」。(オ)総括安全衛生管理者の選任が必要な規模：100人以上（第1号）、300人以上（第2号）、1,000人以上（第3号）の事業場で「50人以上」は衛生管理者等の選任基準。よって④「林業・鉱業・建設業等 / 製造業・電気業・ガス業等 / 総括安全衛生管理者 / 産業医 / 50」が正答。","type":"correct"},{"year":"R3","q_num":"29","id":29,"answer":"①","explanation":"労働安全衛生マネジメントシステム（OSHMS）のPDCAサイクル空欄補充問題。OSHMSのPDCAサイクルの流れ：Plan→安全衛生目標の設定(ア)→安全衛生計画の作成(イ)→Do→危険性又は有害性等の調査の実施(ウ)→安全衛生計画の実施等→Check→日常点検・改善等→Act→システム監査の実施(エ)→改善→システムの見直し。よって正答①：(ア)危険性又は有害性等の調査の実施、(イ)安全衛生目標の設定、(ウ)安全衛生計画の作成、(エ)システム監査の実施。※正答①の組合せ：ア=危険性又は有害性等の調査、イ=安全衛生目標の設定、ウ=安全衛生計画の作成、エ=システム監査の実施。","type":"correct"},{"year":"R3","q_num":"30","id":30,"answer":"②","explanation":"システム信頼度の計算問題。【構成】上段：ユニット1(R1)→ユニット2(R2)の直列、下段：ユニット3(R3)→ユニット4(R4)の直列、それら2系統の並列構成。R1=R2=R3=0.9、システム全体信頼度≧0.9を満たす最小R4を求める。上段信頼度：R1×R2=0.9×0.9=0.81。下段信頼度：R3×R4=0.9×R4。システム信頼度=1−(1−0.81)(1−0.9R4)≧0.9。(1−0.81)(1−0.9R4)≦0.1。0.19(1−0.9R4)≦0.1。1−0.9R4≦0.1/0.19≒0.5263。0.9R4≧0.4737。R4≧0.4737/0.9≒0.526。選択肢のうちこれを満たす最小値は②0.6。","type":"calc"},{"year":"R3","q_num":"31","id":31,"answer":"③","explanation":"科学技術イノベーションと社会に関し最も不適切なものを選ぶ問題。不適切な選択肢③：遺伝子組換え技術で得られた生物は、生物多様性への影響リスクから、カルタヘナ法（生物多様性条約カルタヘナ議定書に基づく国内法）によって使用が規制されており、「使用は規制されていない」は誤りである。表示義務があることは正しいが、使用そのものに規制がないとする記述は不適切。","type":"incorrect"},{"year":"R3","q_num":"32","id":32,"answer":"⑤","explanation":"高年齢労働者の安全と健康に関するガイドラインに関する問題。正答⑤：労働者の健康や体力の状況は高齢になるほど個人差が拡大するとされており、個々の労働者の健康・体力の状況に応じて適合する業務に高年齢労働者をマッチングさせることが望ましいという記述は正しい。①60歳以上の増加に伴い死傷者数に占める割合は増加しているが、年齢や性別による発生率の差はある（高年齢ほど発生率が高い傾向）のため「差がみられない」は誤り。②ロコモティブシンドロームは主に運動器の機能低下による状態であり「認知機能等の心身の活力が低下」という記述は誤り（フレイルの説明に近い）。③健康情報の公開は個人情報保護の観点から不適切。④高年齢者は経験のない業務への安全衛生教育は丁寧に行う必要があり「簡潔に行うのがよい」は誤り。","type":"correct"},{"year":"R3","q_num":"33","id":33,"answer":"④","explanation":"SDGs実施指針改定版に関し最も不適切なものを選ぶ問題。不適切な選択肢④：SDGsの実施指針において「新しい公共」とは、市民・NPO・企業・行政等が連携して公共サービスを担う概念を指すものであり、「共通の地域課題の解決を目指す複数の地方公共団体の連携組織の総称」という説明は誤りである。それは「定住自立圏」や「連携中枢都市圏」等の説明に近く不適切。","type":"incorrect"},{"year":"R3","q_num":"34","id":34,"answer":"⑤","explanation":"エネルギー白書2020（令和元年度）に関する問題。正答⑤：2018年度の我が国のエネルギー自給率は概ね1割程度であり、1960年代に国内の石炭・水力等に依存していた時代と比べて大幅に低下したという記述は正しい（石油危機以降、輸入エネルギー依存が進んだ）。①製造業のエネルギー消費は第一次石油ショック後の省エネ努力により現在は低下または横ばいであり「大きく増加」は誤り。②家庭・運輸部門は省エネが進んだが、同程度の水準というより減少傾向にある。③日本の実質GDP当たりのエネルギー消費はOECD平均を下回る（省エネ先進国）。④化石エネルギー依存度は日本は非常に高く、フランス（原子力比率が高い）より低いは誤り。","type":"correct"},{"year":"R3","q_num":"35","id":35,"answer":"③","explanation":"生物多様性の保全に関し最も不適切なものを選ぶ問題。不適切な選択肢③：ワシントン条約（CITES）とラムサール条約は、生物多様性条約の締結後に補完するために締結されたものではなく、生物多様性条約（1992年）よりも前（ワシントン条約1973年、ラムサール条約1971年）に締結されている。したがって「締結後にそれを補完するために締結された」は誤りであり不適切。","type":"incorrect"},{"year":"R3","q_num":"36","id":36,"answer":"⑤","explanation":"第四次循環型社会形成推進基本計画に関し最も不適切なものを選ぶ問題。不適切な選択肢⑤：3R（リデュース・リユース・リサイクル）の優先順位はリデュース→リユース→リサイクルの順であり、リサイクルの優先順位は最も低い。「リサイクルはリデュース・リユースに比べて優先順位が高い」は誤りであり不適切。また「取組が遅れている」という記述も実態と異なる。","type":"incorrect"},{"year":"R3","q_num":"37","id":37,"answer":"②","explanation":"公害関連法に関し最も不適切なものを選ぶ問題。不適切な選択肢②：騒音規制法は、工場・事業場や建設作業の騒音を規制対象としているが、新幹線鉄道騒音は騒音規制法ではなく「新幹線鉄道騒音に係る環境基準」（環境基本法に基づく）で対応されており、騒音規制法の規制対象外である。よって「騒音規制法の対象には新幹線鉄道騒音も含まれる」は不適切。","type":"incorrect"},{"year":"R3","q_num":"38","id":38,"answer":"⑤","explanation":"第五次環境基本計画の環境政策手法に関し最も不適切なものを選ぶ問題。不適切な選択肢⑤：再生可能エネルギーの固定価格買取制度（FIT）は「経済的手法」に分類される（価格メカニズムを通じて市場参加者の行動を誘導するため）。「手続的手法」ではない。手続的手法の例としては、環境アセスメント制度等が挙げられる。","type":"incorrect"},{"year":"R3","q_num":"39","id":39,"answer":"①","explanation":"環境影響評価法に基づく環境アセスメントの対象施設分類問題。(ア)事業の規模に関わらず対象→第1種事業（規模が大きく必ず実施）：高速自動車国道・新幹線鉄道・飛行場・原子力発電所・ダム等。(イ)事業規模に応じて対象となる場合とならない場合→第2種事業（スクリーニング対象）：林道・一般国道・軌道・風力発電所等。(ウ)事業の規模に関わらず対象とならない→環境アセスメント法の対象外：下水処理場・堤防・廃棄物最終処分場等（他の法律で対応）。正答①：(ア)高速自動車国道、(イ)林道、(ウ)下水処理場。","type":"correct"},{"year":"R3","q_num":"40","id":40,"answer":"③","explanation":"環境教育に関し最も不適切なものを選ぶ問題。不適切な選択肢③：環境教育等促進法（正式名称：環境教育等による環境保全の取組の促進に関する法律）は、学校だけでなく職場・地域等あらゆる場における環境教育を促進することを目的としている。「専ら学校における環境教育を促進させることを目的とした法律」とするのは誤りであり不適切。","type":"incorrect"},{"year":"R4","q_num":"1","id":1,"answer":"①","explanation":"株式の発行による収入は財務活動（資金調達）に分類。②販売収入は営業活動、③配当・利息収入は営業/投資活動、④固定資産売却は投資活動、⑤貸付金回収は投資活動。","type":"correct"},{"year":"R4","q_num":"2","id":2,"answer":"③","explanation":"VEの機能分類：使用機能（目的達成）と貴重機能（感覚的満足）の2種類。①価値=機能÷コスト（除算）、②機能定義は「…を…する」（目的語+動詞）、④目的手段関係はFAST図（親和図ではない）、⑤VEステップは機能定義→機能評価→代替案作成の順。","type":"correct"},{"year":"R4","q_num":"3","id":3,"answer":"⑤","explanation":"FS₂=360（逆算）>Y₂=340。①3次移動平均第5期=302.7<310（大きくない）、②4次(317)>3次(302.7)（4次の方が大きい）、③FS₄=340.8>330（小さくない）、④FS₅=315.96>295（小さくない）。","type":"calc"},{"year":"R4","q_num":"4","id":4,"answer":"④","explanation":"ア:予知保全（設備診断・状態監視で最適タイミング）、イ:保全予防（設計段階から故障要因を排除）、ウ:改良保全（既存設備を故障しにくく改善）。","type":"correct"},{"year":"R4","q_num":"5","id":5,"answer":"③","explanation":"サービスの変動性（Heterogeneity）：提供者・時間・場所によって品質がばらつきやすく、同一サービスの安定的反復提供は困難。「容易」は誤り。","type":"incorrect"},{"year":"R4","q_num":"6","id":6,"answer":"②","explanation":"TOCのDBR方式ではボトルネックのスケジュールは「最初（川上）の工程」に通知する（「最終工程」ではない）。ドラム=ボトルネック、ロープ=川上への通知、バッファ=余裕在庫。","type":"incorrect"},{"year":"R4","q_num":"7","id":7,"answer":"④","explanation":"アジャイル型：短期スプリントで優先度高い機能から実装を繰り返し顧客フィードバックを取り入れる。①はプロトタイプ型、②はウォーターフォール型の説明、③はイテレーティブ型、⑤はV字型モデルの説明。","type":"correct"},{"year":"R4","q_num":"8","id":8,"answer":"①","explanation":"最遅開始時刻=最早開始時刻+TF=10:00+4時間=14時（「13時」は最早完了時刻）。最早完了=13時、最遅完了=17時、作業時間5時間→TF=2時間、7時間→TF=0（CP）はすべて正しい。","type":"incorrect"},{"year":"R4","q_num":"9","id":9,"answer":"③","explanation":"1年単位変形労働時間制では各日の始業・終業時刻は「使用者が」事前に設定。労働者が自由に決定できるのはフレックスタイム制。変形労働時間制とフレックスタイム制の混同。","type":"incorrect"},{"year":"R4","q_num":"10","id":10,"answer":"③","explanation":"不合理な待遇差の禁止は「努力義務」ではなく「義務（禁止規定）」。「努めなければならない」への格下げは誤り。同一労働同一賃金は法的義務。","type":"incorrect"},{"year":"R4","q_num":"11","id":11,"answer":"②","explanation":"事業場外みなし労働時間制・裁量労働制でもテレワークは可能。「できない」は誤り。厚労省テレワークガイドラインは全ての労働時間制度でのテレワーク適用可能性を認める。","type":"incorrect"},{"year":"R4","q_num":"12","id":12,"answer":"⑤","explanation":"高ストレス者が面接指導を受ける必要があるとされた場合、本人からの申出を条件として事業者に面接指導実施義務。①報告書提出は50人以上、②面接指導は申出が条件、③ストレスチェック義務は50人以上、④結果は医師→直接本人通知（事業者は同意なしに取得不可）。","type":"correct"},{"year":"R4","q_num":"13","id":13,"answer":"⑤","explanation":"ア:ネットワーク組織（部門横断・水平的自律的協働）、イ:ティール組織（指揮命令系統なし・自己組織化）、ウ:ピラミッド（上意下達・専門化分業）、エ:マトリクス（2つの指揮命令系統：製品軸×機能軸）。","type":"correct"},{"year":"R4","q_num":"14","id":14,"answer":"④","explanation":"入社後一旦低下→上昇するのは情緒的コミットメント（リアリティショック→適応）。功利的（損得計算）は比較的安定した推移。3種類：情緒的（価値観一致）・功利的（損得計算）・規範的（恩義・義務感）。","type":"incorrect"},{"year":"R4","q_num":"15","id":15,"answer":"③","explanation":"ビジネスモデル変革・グローバル化等の急激な事業変化には外部から即戦力専門人材を調達できるジョブ型が対応しやすい。メンバーシップ型は内部育成のため対応に時間がかかる。「容易である」は誤り。","type":"incorrect"},{"year":"R4","q_num":"16","id":16,"answer":"④","explanation":"上位ランクほど業績（成果・アウトプット）重視、下位ランクほど能力・意欲（インプット）重視が一般的。「上位ランクで能力考課重視」は逆。","type":"incorrect"},{"year":"R4","q_num":"17","id":17,"answer":"②","explanation":"ア:購買履歴で顧客を分類→クラスター分析（教師なし・グルーピング）、イ:事件発生有無（二値）に複数説明変数の影響→ロジスティック回帰分析、ウ:売上金額（連続値）に複数説明変数の影響→重回帰分析。","type":"correct"},{"year":"R4","q_num":"18","id":18,"answer":"③","explanation":"著作権法35条の教育目的複製例外は「学校等の教育機関」に限定。一般企業の研修・従業員教育には適用されない。企業での書籍コピー配布には著作権者の許諾が必要。","type":"incorrect"},{"year":"R4","q_num":"19","id":19,"answer":"⑤","explanation":"MTBF=総時間×稼働率÷故障件数。A:1,008.4（超）、B:995.5（未満）、C:1,004.7（超）。カタログ値超は機種A・Cの2機種。①最低はB、②BはカタログA未満、③B<C、④Cはカタログ超。","type":"calc"},{"year":"R4","q_num":"20","id":20,"answer":"①","explanation":"有価証券報告書は金融商品取引法に基づく「定期開示」（年次）。突発的・臨時的な重要情報の速報である「適時開示」の対象ではない。②大株主異動・③業績予想修正・④工場火災・⑤新株発行は適時開示対象。","type":"correct"},{"year":"R4","q_num":"21","id":21,"answer":"④","explanation":"ア:順序尺度（5段階評価で大小比較○・差分×・比率×・代表値は中央値）、イ:名義尺度の事例=郵便番号（数字だが大小に意味なし）、ウ:比例尺度の事例=身長（比率が意味を持つ）、エ:名義尺度の代表値=最頻値。","type":"correct"},{"year":"R4","q_num":"22","id":22,"answer":"③","explanation":"4P（マーケティングミックス）：Product（製品）・Price（価格）・Place（流通）・Promotion（販売促進）の組み合わせ。①はSWOT分析、②はPPM、④は4C、⑤は3C分析の説明。","type":"correct"},{"year":"R4","q_num":"23","id":23,"answer":"①","explanation":"A:デジタルディスラプション→エ（既存産業破壊）、B:DX→ウ（社会・組織変革）、C:デジタライゼーション→ア（ビジネスモデルデジタル化）、D:デジタルファブリケーション→オ（3Dプリンタ等で造形）、E:デジタルツイン→イ（現実のサイバー空間再現）。","type":"correct"},{"year":"R4","q_num":"24","id":24,"answer":"②","explanation":"デジタル署名の用途は否認防止・なりすまし防止・改ざん検知（真正性・完全性）。盗聴防止には「暗号化（機密性）」が必要。「盗まれないように署名」は誤り。","type":"incorrect"},{"year":"R4","q_num":"25","id":25,"answer":"②","explanation":"度数率=死傷者数÷延べ実労働時間×1,000,000。B:5÷11,000,000×1,000,000≒0.455（0.50未満）のみ。A:1.00、C:0.556、D:0.833、E:0.741はすべて0.50以上。","type":"calc"},{"year":"R4","q_num":"26","id":26,"answer":"④","explanation":"完全自動化設備でも機械故障・誤作動等による不安全状態は生じ得る。不安全状態（物の欠陥・危険な状態）は人の存在とは独立して存在し得る。","type":"incorrect"},{"year":"R4","q_num":"27","id":27,"answer":"①","explanation":"国土強靱化基本計画の対象リスクは自然災害だけでなく原子力災害・大規模事故等を含む「あらゆる事象」を対象とする。","type":"correct"},{"year":"R4","q_num":"28","id":28,"answer":"②","explanation":"VTA（変動ツリー分析）は「通常からの逸脱（変動）」を起点として事故の連鎖を分析する手法。「通常通りに進行していても事故が起こる」前提ではない。","type":"incorrect"},{"year":"R4","q_num":"29","id":29,"answer":"②","explanation":"AI利活用ガイドラインでは精度基準は事後（権利侵害発生後）に定めるのではなく「あらかじめ（事前に）」設定することが期待される。事前の品質管理・精度基準設定が重要。","type":"incorrect"},{"year":"R4","q_num":"30","id":30,"answer":"①","explanation":"民法改正（2020年）による契約不適合時の救済：双方とも帰責事由なしの場合、ア:損害賠償→できない（帰責事由が必要）、イ:解除→できる（帰責事由不要）、ウ:追完請求→できる（買主帰責なければ可）。","type":"correct"},{"year":"R4","q_num":"31","id":31,"answer":"②","explanation":"機械・器具・設備の設計者・製造者の義務は設計段階での安全性確保（本質的安全設計）。「使用する全事業所の労働者への定期安全衛生教育」は事業者（使用者）の義務。義務主体が異なる。","type":"incorrect"},{"year":"R4","q_num":"32","id":32,"answer":"④","explanation":"JIS Q 31000序文：ア:戦略（の決定を支援）、イ:リーダーシップ（の一部）、ウ:マネジメントシステム（の改善に寄与）、エ:ステークホルダ（とのやり取りを含む）。","type":"correct"},{"year":"R4","q_num":"33","id":33,"answer":"①","explanation":"カーボンニュートラルなまちづくりは都市機能の「集約（コンパクトシティ化）」が基本。「分散化を促進」は誤り。移動距離短縮によるCO₂削減が目的。","type":"incorrect"},{"year":"R4","q_num":"34","id":34,"answer":"③","explanation":"FIT制度：ア:一定価格（固定）での買取、イ:地熱（太陽光・風力・水力・地熱・バイオマスの5種）、ウ:賦課金（再エネ賦課金）、エ:全国（一律単価）、オ:経済産業大臣（毎年度決定）。","type":"correct"},{"year":"R4","q_num":"35","id":35,"answer":"⑤","explanation":"特定外来生物被害防止基本方針：特別な機器なしに種類判別可能な生物分類群を対象とし、菌類・細菌類・ウイルス等の微生物は当分の間対象としない。①交雑種も対象可、②ヒアリは特定外来生物に指定、③他水域からのブラックバス放流は禁止。","type":"correct"},{"year":"R4","q_num":"36","id":36,"answer":"④","explanation":"バーゼル法に基づく特定有害廃棄物等の輸出入：実態としては輸出量が輸入量を上回る傾向。「輸入量が輸出量を上回っている」は誤り。","type":"correct"},{"year":"R4","q_num":"37","id":37,"answer":"⑤","explanation":"警戒レベル5は「緊急安全確保」（すでに避難困難・命を守る最善の行動）。「避難指示」は警戒レベル4の情報。「危険な場所から全員避難」もレベル4（避難指示）の行動。","type":"incorrect"},{"year":"R4","q_num":"38","id":38,"answer":"④","explanation":"自動車NOx・PM法の規制対象は主にディーゼル車。ガソリン車・LPG乗用車は原則対象外（NOx・PM排出が少ないため）。「ガソリン車・LPG車も対象」は誤り。","type":"incorrect"},{"year":"R4","q_num":"39","id":39,"answer":"③","explanation":"環境影響評価準備書作成時→対象事業の影響を受ける地域を管轄する都道府県知事及び市町村長に準備書と要約書類を送付義務。①計画段階配慮書は第一種事業のみ、②方法書段階の手続きはスコーピング（スクリーニングではない）、④住民説明会は準備書段階（評価書段階ではない）。","type":"correct"},{"year":"R4","q_num":"40","id":40,"answer":"⑤","explanation":"ネガティブ・スクリーニングは特定業種・基準未達企業を投資対象から「除外」する手法。「議決権行使で企業に改善を促す」のはエンゲージメント（対話型投資）の説明。","type":"incorrect"},{"year":"R5","q_num":"1","id":1,"answer":"②","explanation":"動的計画法による資源配分問題。A:1単位(1,000万円)、B:1単位、C:2単位の投資で利益の和が640万円（最大）となる。全組合せ列挙：A:1,B:1,C:2→200+150+290=640が最大。","type":"calc"},{"year":"R5","q_num":"2","id":2,"answer":"①","explanation":"損益分岐点販売量x*=F/(p-v)。FとpFixed、vが増加→分母(p-v)縮小→x*増加。「減少する」は誤り。","type":"incorrect"},{"year":"R5","q_num":"3","id":3,"answer":"②","explanation":"設計管理用語の組合せ。正解：A-イ（信頼性設計）、B-ア（保全性設計）、C-エ（デザインイン）、D-オ（デザインレビュー）、E-ウ（フロントローディング）。","type":"correct"},{"year":"R5","q_num":"4","id":4,"answer":"①","explanation":"QC7つ道具の用途。①パレート図は改善すべき重要項目の特定に使う。②管理図の説明が誤（ヒストグラムの説明）、③ヒストグラムが誤（散布図の説明）、④散布図が誤（特性要因図の説明）、⑤特性要因図が誤（管理図の説明）。","type":"correct"},{"year":"R5","q_num":"5","id":5,"answer":"②","explanation":"設備総合効率=時間稼働率×性能稼働率×良品率。段取り作業の「省人化」は製造コスト削減に寄与するが設備総合効率の3要素に直接影響しない。「段取り時間の短縮」なら時間稼働率向上に寄与するが「省人化」は別。","type":"incorrect"},{"year":"R5","q_num":"6","id":6,"answer":"②","explanation":"SPT則（最短処理時間順）でリードタイム平均値を最小化。A=4,B=8,C=2,D=10,E=6→短い順：C→A→E→B→D。累積リードタイム(2+6+12+20+30)/5=14で最小。","type":"calc"},{"year":"R5","q_num":"7","id":7,"answer":"③","explanation":"ECRSの原則（排除・結合・入替・簡素化）は業務効率化のフレームワーク。「許容範囲を狭める」ことは業務量増加・効率低下につながりECRSの趣旨と逆方向。","type":"incorrect"},{"year":"R5","q_num":"8","id":8,"answer":"⑤","explanation":"バスタブカーブは故障率の経時変化（初期故障→偶発故障→摩耗故障）を示す信頼性工学の概念。「需要予測」には使用しない。需要予測には移動平均・指数平滑法等を使用。","type":"incorrect"},{"year":"R5","q_num":"9","id":9,"answer":"④","explanation":"労働安全衛生法の労働時間把握義務（令和元年改正）は裁量労働制適用者・管理監督者「も含む」全労働者が対象。「除き」という記述が誤り。","type":"incorrect"},{"year":"R5","q_num":"10","id":10,"answer":"②","explanation":"女性活躍推進法のポジティブアクション（積極的改善措置）として女性に有利な措置は認められる→正しい。①は「数に関わらず」が誤（規模要件あり）、③は「努めなければ」が誤（義務）、④育休期間は出勤日数に含まれる、⑤えるぼしとくるみん認定の混同。","type":"correct"},{"year":"R5","q_num":"11","id":11,"answer":"①","explanation":"パワハラの定義要件：優越的関係＋業務上相当範囲を超える＋就業環境を害する。「就業環境が害されるか否かに依らない」は誤り。就業環境が害されることがパワハラ成立の要件。","type":"incorrect"},{"year":"R5","q_num":"12","id":12,"answer":"④","explanation":"労働委員会は個別労働関係紛争について「仲裁裁定」を行う権限はない（集団的労使紛争が対象）。個別紛争では紛争調整委員会によるあっせんのみ。","type":"incorrect"},{"year":"R5","q_num":"13","id":13,"answer":"②","explanation":"組織開発の診断型は診断フェーズ（サーベイ等）があるが対話も重視→正しい。①個人への働きかけも含む、③X理論は「人間は怠惰」前提（人間尊重はY理論）、④コンテントとプロセスの説明が逆、⑤AIは対話型（診断型ではない）。","type":"correct"},{"year":"R5","q_num":"14","id":14,"answer":"②","explanation":"職務等級制度は職務変更時に等級も変わるため頻繁な人事異動には不向き。「人事異動・職務変化に適し組織の柔軟性が保てる」のは職能資格制度のメリット。","type":"incorrect"},{"year":"R5","q_num":"15","id":15,"answer":"⑤","explanation":"教育訓練技法の正しい対応：A-ケースメソッド=イ（事例分析・意思決定能力）、B-インバスケット=ウ（書類処理・判断力）、C-ロールプレイング=エ（立場行動・コミュニケーション）、D-ブレインストーミング=ア（アイデア・創造性）。","type":"correct"},{"year":"R5","q_num":"16","id":16,"answer":"③","explanation":"心理的安全性×業績基準の4象限：A（高・低）=イ（充実感少・ぬるい職場）、B（高・高）=エ（協力・革新・学習する職場）、C（低・低）=ア（保身・無気力）、D（低・高）=ウ（ビクビク・過酷）。","type":"correct"},{"year":"R5","q_num":"17","id":17,"answer":"④","explanation":"不正競争防止法の不正競争に「該当しない」もの：客観的事実に基づく他社商品との比較広告は許容される（不正競争に該当しない）。①商品形態模倣、②ドメイン名不正取得、③品質誤認表示、⑤信用毀損はすべて不正競争に該当。","type":"correct"},{"year":"R5","q_num":"18","id":18,"answer":"⑤","explanation":"SECIモデルの内面化（Internalization）：形式知を自分のものとして取り込み暗黙知化→正しい。①組織全体が知識創造の主体（経営者だけではない）、②暗黙知は無くすべきではない、③MBWAは共同化（暗黙知→暗黙知）、④連結化は有益なプロセス。","type":"correct"},{"year":"R5","q_num":"19","id":19,"answer":"①","explanation":"情報セキュリティ認証規格の対応：ア=ISMS→JIS Q 27001、イ=プライバシーマーク→JIS Q 15001、ウ=ITセキュリティ評価→ISO/IEC 15408（コモンクライテリア）。","type":"correct"},{"year":"R5","q_num":"20","id":20,"answer":"②","explanation":"コミュニケーション・マネジメント計画書は状況変化に応じて更新・改訂が必要。「開始後の変更は避けなければならない」は誤り（計画書は生きた文書）。","type":"incorrect"},{"year":"R5","q_num":"21","id":21,"answer":"④","explanation":"信頼係数95%の信頼区間は99%より「狭い」（広いではない）。信頼係数を上げるほど区間が広くなる。X̄=68、X̄はμの最尤推定量・95%信頼区間に含まれる・σ²未知でも信頼区間は定まる（t分布使用）はすべて正しい。","type":"incorrect"},{"year":"R5","q_num":"22","id":22,"answer":"③","explanation":"緊急速報メール（エリアメール）はそのエリアに「居合わせた」携帯電話利用者にも配信される（居住者に限らない）。「居住者以外には伝達できない」は誤り。エリア内の全携帯に届くのが特長。","type":"incorrect"},{"year":"R5","q_num":"23","id":23,"answer":"⑤","explanation":"デジタル技術用語の正しい対応：A-IoT=オ（モノのネット接続）、B-RPA=エ（定型作業の自動化）、C-NFT=イ（ブロックチェーン上のトークン）、D-ITS=ウ（高度道路交通システム）、E-DX=ア（デジタルによる変革）。","type":"correct"},{"year":"R5","q_num":"24","id":24,"answer":"②","explanation":"エッジコンピューティングはエンドユーザ付近にデータ処理を分散し通信量・遅延を削減する→正しい。①IPv6は約340澗個（43億はIPv4）、③5Gの多数同時接続はIoT機器向け、④スマートグリッドは電力系統（メタバースではない）、⑤NFVはソフトウェアで汎用サーバ上に実装（逆）。","type":"correct"},{"year":"R5","q_num":"25","id":25,"answer":"⑤","explanation":"JIS Q 31000のリスクアセスメントプロセス：リスク特定(ア)→リスク分析→リスク評価(イ)、その後リスク対応(ウ)、外側にモニタリング及びレビュー(エ)。①②③④はア・イ・ウの順序または内容が誤り。","type":"correct"},{"year":"R5","q_num":"26","id":26,"answer":"③","explanation":"消安法上、特定保守製品の説明義務は「特定保守製品取引事業者」に限られる。「個人売主」が個人間売買で特定保守製品を引き渡す場合は説明義務がない。","type":"incorrect"},{"year":"R5","q_num":"27","id":27,"answer":"⑤","explanation":"南海トラフ地震応急対策計画における広域物資輸送拠点は「支援側都道府県→被災地」への送り出し拠点。管内市区町村から物資を集積するという説明が誤り。","type":"incorrect"},{"year":"R5","q_num":"28","id":28,"answer":"⑤","explanation":"リスク低減措置の正しい優先順位：ウ）本質的安全化（設計段階での危険除去）→イ）管理的対策→ア）個人用保護具。「ア）からウ）の優先順位」は逆。","type":"incorrect"},{"year":"R5","q_num":"29","id":29,"answer":"①","explanation":"リスクコミュニケーションでは、危険・危害因子に関する知識提供だけでなく感情的反応（怒り・不安）も含めた総合的なアプローチが必要。「前者（危険因子）の知識提供に特化」は誤り。","type":"incorrect"},{"year":"R5","q_num":"30","id":30,"answer":"⑤","explanation":"高年齢労働者安全健康ガイドライン：健康診断結果は個人情報として保護が必要。本人同意なく「労働者の氏名とともに」安全衛生委員会に報告することは不適切。匿名化等の処理が必要。","type":"incorrect"},{"year":"R5","q_num":"31","id":31,"answer":"④","explanation":"BCM（事業継続マネジメント）では「結果事象（ある拠点が使用不能など）」から事業への影響を考えるオールハザードアプローチが推奨される。「原因事象（直下型地震等）から考えることが望ましい」は誤り。","type":"incorrect"},{"year":"R5","q_num":"32","id":32,"answer":"③","explanation":"FTA計算：系統電源喪失=1-(1-0.05)(1-0.10)=0.145。自家発2台の両方故障=0.05×0.05=0.0025。停電確率=0.145×0.0025≒3.6×10⁻⁴。","type":"calc"},{"year":"R5","q_num":"33","id":33,"answer":"④","explanation":"HFCの排出量はここ十数年増加傾向→正しい。①CO₂は約9割（5割は誤）、②総排出量は2013年度以降「減少」傾向、③家庭部門は産業部門を「下回る」、⑤2019年国別排出量1位は中国（米国は2位）。","type":"correct"},{"year":"R5","q_num":"34","id":34,"answer":"⑤","explanation":"第6次エネルギー基本計画での2030年原子力の電源構成比率は「20〜22%程度」。「6%程度」は誤り。","type":"incorrect"},{"year":"R5","q_num":"35","id":35,"answer":"①","explanation":"ラムサール条約の基本原則は「ワイズユース（賢明な利用）」であり、条約湿地の利用を「抑制する」ものではなく持続可能な方法での利用を推進する。","type":"incorrect"},{"year":"R5","q_num":"36","id":36,"answer":"④","explanation":"プラスチック資源循環法：分別基準の策定義務は市町村の責務（都道府県ではない）。都道府県の責務はより広域的な計画・支援。","type":"incorrect"},{"year":"R5","q_num":"37","id":37,"answer":"①","explanation":"環境政策手段の分類：ア=パフォーマンス規制（達成レベル指定・手段は自由）、イ=環境税（負担による誘導）、ウ=税制優遇（助成による誘導）、エ=SDS（情報的手法）、オ=PRTR制度（手続き的手法）。","type":"correct"},{"year":"R5","q_num":"38","id":38,"answer":"③","explanation":"バックキャスティングは「望ましい将来の姿を設定し逆算して現在の行動を導く手法」。「現状を前提に目標は明示せず、できるところから行う」のはフォアキャスティングの説明。","type":"incorrect"},{"year":"R5","q_num":"39","id":39,"answer":"⑤","explanation":"環境影響評価法：評価書段階では「公告・縦覧」のみ。「説明会の開催義務」があるのは方法書の段階。評価書段階での説明会開催義務は規定されていない。","type":"incorrect"},{"year":"R5","q_num":"40","id":40,"answer":"②","explanation":"TCFD提言の「戦略」項目では気候変動シナリオに基づく財務的影響分析が求められる。「産業連関法によるインベントリ分析」はTCFD戦略項目の内容とは異なる（環境影響分析LCA等の手法）。","type":"incorrect"},{"year":"R6","q_num":"1","id":1,"answer":"③","explanation":"財務諸表等規則のキャッシュ・フロー計算書では，営業活動：財貨・用役の購入（E）＋税金・関税・罰科金（B），投資活動：設備等の取得（C）＋他社株式の取得（F），財務活動：配当・分配（A）＋社債等の償還（D）と分類される。選択肢③がこの区分に正しく対応している。","type":"correct"},{"year":"R6","q_num":"2","id":2,"answer":"③","explanation":"<div class=\"rich\">\n  <div class=\"rich-section\">\n    <div class=\"rich-lead\">問題の構造</div>\n    <p class=\"expl\">現行設備のNPV <strong>≒165万円</strong>。追加投資xを行うと毎年の収益が増えるが、コストがかかる。<br>\n    <strong>追加投資しても現行と同じNPVになる限界のxを求める</strong>問題。</p>\n  </div>\n  <div class=\"rich-section\">\n    <div class=\"rich-lead\">年金現価係数とは</div>\n    <div class=\"formula-box\">\n      年金現価係数 = <span class=\"frac\"><span class=\"frac-n\">1 − (1+r)<sup>−n</sup></span><span class=\"frac-d\">r</span></span>\n    </div>\n    <p class=\"expl\" style=\"margin-top:8px\">割引率5%・期間nの場合に<strong>毎年1万円を受け取る合計の現在価値</strong>を一発で計算できる係数です。</p>\n    <table class=\"expl-tbl\" style=\"margin-top:8px\">\n      <tr><th>期間n</th><th>年金現価係数（r=5%）</th><th>意味</th></tr>\n      <tr><td>3年</td><td>2.723</td><td>毎年1万円×3年の現在価値</td></tr>\n      <tr><td>4年</td><td>3.546</td><td>毎年1万円×4年の現在価値</td></tr>\n      <tr><td>5年</td><td>4.329</td><td>毎年1万円×5年の現在価値</td></tr>\n    </table>\n  </div>\n  <div class=\"rich-section\">\n    <div class=\"rich-lead\">解き方のステップ</div>\n    <div class=\"step-list\">\n      <div class=\"step\"><span class=\"step-n\">1</span><div>収益増加分の現在価値 = ΔCF × 年金現価係数</div></div>\n      <div class=\"step\"><span class=\"step-n\">2</span><div>損益分岐条件を設定：<br>追加投資なしNPV = 追加投資ありNPV<br>→ 165万円 = (165万円 + 収益増加の現在価値) − x</div></div>\n      <div class=\"step\"><span class=\"step-n\">3</span><div>整理すると <strong>x = 収益増加分 × 年金現価係数 ≒ 147万円</strong></div></div>\n    </div>\n  </div>\n  <div class=\"rich-section\">\n    <div class=\"rich-lead\">判断の境界線</div>\n    <table class=\"expl-tbl\">\n      <tr><th>追加投資額x</th><th>判断</th></tr>\n      <tr><td>x &lt; 147万円</td><td>✔ 追加投資すべき（NPV増加）</td></tr>\n      <tr class=\"row-correct\"><td><strong>x ≒ 147万円</strong></td><td>✔ 損益分岐点（正答③）</td></tr>\n      <tr><td>x &gt; 147万円</td><td>✗ 投資コストが見合わない</td></tr>\n    </table>\n  </div>\n  <div class=\"rich-tip\">\n    <span class=\"tip-icon\">💡</span>\n    <div><strong>総監的視点</strong><br>\n    NPVはプロジェクトの<strong>経済的付加価値を現在価値で定量化</strong>する手法。\n    追加投資の意思決定では「投資額の閾値（損益分岐点）を数値で示せるか」が問われています。</div>\n  </div>\n</div>","type":"calc","rich":true},{"year":"R6","q_num":"3","id":3,"answer":"⑤","explanation":"製造間接費900万円を各配賦基準で按分した場合のプロジェクトX個別原価を計算する。総作業時間（直接労務費）比例では，X:Y:Z=600:200:200=3:1:1となり，Xへの配賦額=900×(3/5)=540万円，個別原価=500+600+200+540=1840万円が唯一正しい選択肢⑤となる。","type":"correct"},{"year":"R6","q_num":"4","id":4,"answer":"④","explanation":"ア：重さを測定→「計量値」による検査（計数値は合格・不合格などの離散的な数値）。イ：合否判定抜取検査はサンプルサイズと判定基準を組み合わせて計画する。ウ：品質水準が合格とされる値なのに不合格としてしまう確率→「生産者危険」（第一種の誤り）。よって正解は④（計量値・サンプルサイズ・生産者危険）。","type":"correct"},{"year":"R6","q_num":"5","id":5,"answer":"②","explanation":"プッシュ型生産方式の代表例はMRP（資材所要量計画）等であり，JIT生産方式はプル型の代表例。JITをプッシュ型と記述している選択肢②が最も不適切。他の選択肢（プル型の集中管理不要，JITのねらい，JITの広範な応用，かんばん2種類）は正しい内容。","type":"incorrect"},{"year":"R6","q_num":"6","id":6,"answer":"③","explanation":"PERTによる分析。最早開始・最遅開始を計算するとクリティカルパスはA(またはB)→D→F（23時間）。作業Eの全余裕時間=最遅終了(23)−最早終了(22)=1時間，が唯一正しい記述。","type":"calc"},{"year":"R6","q_num":"7","id":7,"answer":"①","explanation":"線形計画法による利益最大化。選択肢③は原料L制約を満たさない実行不可能解。残る選択肢の利益を計算すると①(x=0,y=60)=300万円が最大。利益最大化のためには利益単価の高い製品Q（5万円/kg）をできる限り多く生産することが最適解となる。","type":"calc"},{"year":"R6","q_num":"8","id":8,"answer":"④","explanation":"系統図法は目的と手段の関係を段階的に展開する手法（Why-How分析の樹形図）。「問題と要因の因果関係を矢印でつなぐ」のは連関図法・特性要因図の特徴であり，系統図法の説明ではない。他の選択肢（QCストーリー，PDPC法，親和図法，マトリックス図法）は正しい内容。","type":"incorrect"},{"year":"R6","q_num":"9","id":9,"answer":"⑤","explanation":"1年単位の変形労働時間制は，あらかじめ定めた労使協定に基づき，各日の労働時間を特定するものであり，労働者が自由に変更できるものではない。自由な時刻設定が可能なのはフレックスタイム制。これが不適切な記述⑤の根拠。","type":"incorrect"},{"year":"R6","q_num":"10","id":10,"answer":"①","explanation":"70歳までの就業確保措置は努力義務であり，法的義務ではない（65歳までは義務）。選択肢①は「措置を講じなければならない」という義務表現を使っており，これが不適切。","type":"incorrect"},{"year":"R6","q_num":"11","id":11,"answer":"④","explanation":"産後パパ育休中の就業は，就業日の労働時間合計が休業期間中の所定労働時間合計の2分の1以下という上限がある。「所定労働時間の合計以下」と誤って記述しており，実際より緩い基準になっている点が誤り。","type":"incorrect"},{"year":"R6","q_num":"12","id":12,"answer":"③","explanation":"労災保険の特別加入制度により，中小事業主・一人親方・自営業者等も一定の条件下で労災保険に加入できる。「加入することはできない」は特別加入制度を否定しており誤り。","type":"incorrect"},{"year":"R6","q_num":"13","id":13,"answer":"②","explanation":"健康経営優良法人認定制度の上位認定：大規模法人部門→「ホワイト500」，中小規模法人部門→「ブライト500」。選択肢②は大規模法人部門に「ブライト500」と誤って記載している。","type":"incorrect"},{"year":"R6","q_num":"14","id":14,"answer":"④","explanation":"男女雇用機会均等法のポジティブアクション（暫定的な特別措置）は，女性労働者の地位改善を目的とした措置のみを認めており，「男女を問わず不利な方への優遇」という表現は法の範囲を越えている。選択肢④が最も不適切。","type":"incorrect"},{"year":"R6","q_num":"15","id":15,"answer":"③","explanation":"職業能力開発促進法に基づくキャリアコンサルタントの守秘義務は個人の面談内容に関するもの。組織全体の傾向・課題は企業へ報告可能であり，「報告してはならない」という記述は誤り。","type":"incorrect"},{"year":"R6","q_num":"16","id":16,"answer":"⑤","explanation":"各施策と理論の正しい対応：\nA（表彰制度・目標管理→自尊・自己実現欲求充足）→マズローの欲求5段階説（ウ）\nB（経営参加制度→自発的行動）→マクレガーのY理論（X理論とY理論のうちY理論的施策：イ）\nC（成果表彰→ボーナスより承認重視）→ハーズバーグの二要因理論（エ：動機付け要因=達成・承認・仕事内容）\nD（標準作業量・差別出来高制）→テイラーの科学的管理法（ア）\n正解⑤はウ・イ・エ・アの組合せ。","type":"correct"},{"year":"R6","q_num":"17","id":17,"answer":"③","explanation":"NISTのクラウドの5基本特徴：オンデマンド・セルフサービス，幅広いネットワークアクセス，リソースプーリング，迅速な伸縮性，サービスの計測。選択肢③「広く一般の自由な利用」はパブリッククラウドの特性であり，基本的特徴には含まれない。","type":"incorrect"},{"year":"R6","q_num":"18","id":18,"answer":"④","explanation":"k平均法は「非階層的クラスター分析」の代表的手法。「階層的クラスター分析の代表がk平均法」という記述が誤り。階層的クラスター分析はウォード法・完全連結法等が代表的手法であり，大量データには不向き。","type":"incorrect"},{"year":"R6","q_num":"19","id":19,"answer":"⑤","explanation":"JIS Q 27001（ISO/IEC 27001）の情報セキュリティ方針に関する問題。正答⑤。\n\n①【誤り】情報セキュリティ方針の確立・承認権限は「トップマネジメント（最高経営層）」にある。情報セキュリティ担当部門が独自に制定できるものではない。\n\n②【誤り】情報セキュリティ方針は「組織の目的に対して適切」でなければならない。方針は組織の事業目的・戦略と整合していることが要件であり、単に技術的な内容だけでは不十分。\n\n③【誤り】情報セキュリティ方針は「文書化した情報として利用可能な状態」にしなければならない（文書化必須）。口頭での周知だけでは要件を満たさない。\n\n④【誤り】情報セキュリティ方針には「情報セキュリティ目標を設定するための枠組みを提供する」ことが含まれなければならない。目標設定を方針に含めないことは誤り。\n\n⑤【正答】JIS Q 27001では、情報セキュリティ方針を「必要に応じて、利害関係者が入手できるようにしなければならない」と規定している。すべてを公開する義務はないが、必要な範囲では入手可能にする義務がある。","type":"correct"},{"year":"R6","q_num":"20","id":20,"answer":"①","explanation":"インナーゲーム（ティモシー・ガルウェイ）は，内的妨害（Self 1の批判的声）を静めることで本来の能力（Self 2）を引き出す手法。「批判的評価を促す」は正反対のアプローチであり，不適切な記述。","type":"incorrect"},{"year":"R6","q_num":"21","id":21,"answer":"⑤","explanation":"情報公開法（行政機関の保有する情報の公開に関する法律）に関する問題。正答⑤。\n\n①【誤り】行政文書の定義には「職員が職務上作成した文書」だけでなく、「職務上取得した文書」も含まれる。取得した文書を除外する記述は誤り。\n\n②【誤り】官報・白書・新聞・雑誌・書籍など、不特定多数の者に販売することを目的として発行されるものは、行政文書の定義から除外されている（法第2条第2項ただし書）。「含む」とする記述は誤り。\n\n③【誤り】情報公開法では、開示請求をする者は氏名・名称および住所・居所を開示請求書に記載しなければならない（法第4条）。匿名での請求は認められていない。\n\n④【誤り】行政文書の存否を答えること自体が不開示情報の開示につながる場合は、当該文書の存否を明らかにしないで開示請求を拒否できる（存否応答拒否・法第8条）。「存否を明らかにしなければならない」とする記述は誤り。\n\n⑤【正答】法第7条（裁量的開示）：行政機関の長は、不開示情報が記録されている場合であっても、公益上特に必要があると認めるときは、開示請求者に対し当該行政文書を開示することができる。","type":"correct"},{"year":"R6","q_num":"22","id":22,"answer":"③","explanation":"産業財産権4種の存続期間に関する問題。正答③。\n\nまず4種の正しい存続期間を整理する：\n\n・特許権　　＝ 出願日から 20年（医薬品等は最長＋5年延長可）\n・実用新案権＝ 出願日から 10年\n・意匠権　　＝ 出願日から 25年（2020年意匠法改正で登録から20年→出願から25年に変更）\n・商標権　　＝ 設定登録日から 10年（更新可・事実上無期限）\n\n上記4つすべてが正しく記載されているのが選択肢③であり、正答。\n\n他の選択肢①②④⑤はいずれも上記のいずれかの年数・起算点を誤っている。\n特に混同しやすいのは以下の2点：\n・意匠権は「出願から25年」（改正前の「登録から20年」と混同しない）\n・商標権の起算点は「設定登録日」（出願日ではない）","type":"correct"},{"year":"R6","q_num":"23","id":23,"answer":"④","explanation":"ブロックチェーンの分散型台帳の特性として，参加ノード増加→分散化進展→改ざん耐性向上（51%攻撃コスト増大）→耐障害性向上。選択肢④の「低下する」は誤り。","type":"incorrect"},{"year":"R6","q_num":"24","id":24,"answer":"②","explanation":"ランサムウェアの基本的動作はデータ暗号化→復号と引き換えに身代金要求。「データ盗取+インターネット公開」は暴露型の追加手口であり，「一般に」という表現で全ランサムウェアの典型的動作として記述するのは誤り。","type":"incorrect"},{"year":"R6","q_num":"25","id":25,"answer":"④","explanation":"リスク認知バイアスと具体事例の組合せ問題。正答④：A→ウ、B→ア、C→イ、D→エ。\n\n①②③【誤りの組合せ】各バイアスと事例の正しい対応は以下のとおり。誤りの選択肢はいずれかの対応が入れ替わっている。\n\n(A)正常性バイアス：異常な状況を「自分には関係ない・正常の範囲」と過小評価するバイアス。\n→(ウ)「堤防が決壊しても自分の家は大丈夫」が該当（危険を軽視）\n\n(B)カタストロフィーバイアス（確率無視バイアス）：実際にはごく稀な事象のリスクを過大評価するバイアス。\n→(ア)「隕石落下のニュースを見て地下シェルターを建設した」が該当（極低確率リスクを過大視）\n\n(C)ベテランバイアス（経験バイアス）：長年の経験・実績に基づき「自分には起きない」と過信するバイアス。\n→(イ)「内部犯行が起きたことがないという経験から管理体制を強化しなかった」が該当\n\n(D)バージンバイアス（類似経験からの楽観バイアス）：過去の類似状況では問題がなかった経験から今回も大丈夫と判断するバイアス。\n→(エ)「以前の苦情が時間とともに収まった経験から今回も対応しなかった」が該当\n\n④【正答】ウ・ア・イ・エの組合せ。","type":"correct"},{"year":"R6","q_num":"26","id":26,"answer":"③","explanation":"早期発見・早期対処の中心は，労働者自身のセルフケア支援，管理監督者によるラインケア（早期気づきと対応），産業医・保健師等への相談体制整備。「職場環境の事項を点検・改善」は職場環境改善段階の取組であり，段階が異なる。","type":"incorrect"},{"year":"R6","q_num":"27","id":27,"answer":"②","explanation":"機械の制御機構と内容の組合せ問題。正答②：A→ア、B→エ、C→イ、D→ウ。\n\n①③④⑤【誤りの組合せ】各制御機構の正しい対応は以下のとおり。誤りの選択肢はいずれかが入れ替わっている。\n\n(A)ガード用インターロック：機械の危険領域を囲うガード（カバー）と連動した回路。ガードが開いていると機械が起動・運転できない仕組み。\n→(ア)「機械の運転中に作業者が危険領域に侵入するのを防止する回路」が該当\n\n(B)急停止用安全回路：機械側（センサ・検出器）が異常を感知したときに自動で機械を停止させる回路。人の操作なしに作動する。\n→(エ)「機械側が異常を感知したときに直ちに停止させる回路」が該当\n\n(C)非常停止用安全回路：作業者が異常・危険を発見したときに手動で操作して機械を停止させる回路（非常停止ボタン等）。\n→(イ)「作業者が異常を感知したときに直ちに停止させる回路」が該当\n\n(D)ホールド・ツー・ラン制御：操作装置（ボタン・レバー等）を押し続けている間だけ機械が動作し、手を離すと即座に停止する制御方式。意図しない動作を防ぐ。\n→(ウ)「操作装置を押している間だけ運転し、離すと即停止する回路」が該当\n\n②【正答】ア・エ・イ・ウの組合せ。","type":"correct"},{"year":"R6","q_num":"28","id":28,"answer":"⑤","explanation":"記録的短時間大雨情報は，その地域で観測史上最大級の短時間大雨（解析雨量で観測史上1〜2位水準）が観測された際に発表。「数年に一度」という表現は不正確（実際は観測記録更新レベル）。","type":"incorrect"},{"year":"R6","q_num":"29","id":29,"answer":"②","explanation":"2022年改正で，保護対象が従来の労働者（正規・非正規）から，退職後1年以内の退職者および役員にも拡大された。「役員は含まれない」は誤りであり，これが最も不適切な選択肢②。","type":"incorrect"},{"year":"R6","q_num":"30","id":30,"answer":"①","explanation":"OSHMS指針は労働安全衛生法に基づく制度であり，対象は同法上の「労働者」。無償ボランティアは雇用関係がないため労働者に該当せず，指針の対象外。","type":"incorrect"},{"year":"R6","q_num":"31","id":31,"answer":"④","explanation":"左ブロック（並列）：1-(1-0.8)²=0.96，右ブロック（並列）：1-(1-0.7)²=0.91，全体（直列）：0.96×0.91=0.8736≒0.874。選択肢④が最も近い値。","type":"calc"},{"year":"R6","q_num":"32","id":32,"answer":"③","explanation":"国土強靱化基本法において，脆弱性評価と指針策定は国土強靱化基本計画の策定に関連する手続き。「実施中期計画案の作成時」と記述している点が誤り。","type":"incorrect"},{"year":"R6","q_num":"33","id":33,"answer":"①","explanation":"エルニーニョ現象と日本の気候への影響に関する問題。正答①。\n\nエルニーニョ現象：東太平洋赤道域（ペルー沖）の海面水温が平年より高くなる現象（数年に一度発生、半年〜1年半持続）。\n\n②【誤り】エルニーニョ発生時、西太平洋熱帯域の海面水温は「低下」する（東高西低の水温分布になる）。「上昇する」とする記述は誤り。\n\n③【誤り】エルニーニョ発生時の日本の夏は、太平洋高気圧の張り出しが弱まるため「気温が低くなる（冷夏）」傾向がある。「高くなる」とする記述は誤り。\n\n④【誤り】エルニーニョ発生時の日本の冬は、西高東低の冬型気圧配置が弱まるため「気温が高くなる（暖冬）」傾向がある。「低くなる」とする記述は誤り。\n\n⑤【誤り】エルニーニョとラニーニャの説明が逆転しているか、影響の方向性が誤っている記述。ラニーニャ現象（東太平洋の海面水温が低下）は日本の夏に高温・冬に低温をもたらす傾向がある。\n\n①【正答】エルニーニョ発生→西太平洋熱帯域の海面水温が低下→積乱雲活動が不活発→太平洋高気圧の張り出しが弱い→日本の夏は低温（冷夏）、冬は高温（暖冬）の傾向。","type":"correct"},{"year":"R6","q_num":"34","id":34,"answer":"③","explanation":"FIT制度の買取価格は再生可能エネルギーの種類・規模・導入年度によって異なる（太陽光・風力・バイオマス等それぞれ別価格）。「種類に関わらず一律」という記述が誤り。","type":"incorrect"},{"year":"R6","q_num":"35","id":35,"answer":"②","explanation":"LMOの国際的な枠組み=カルタヘナ議定書（2000年）。名古屋議定書（2010年，COP10）は遺伝資源の利益配分（ABS）に関する議定書。両者の内容を混同した記述が誤り。","type":"incorrect"},{"year":"R6","q_num":"36","id":36,"answer":"④","explanation":"廃プラスチックの有効利用形態の量的順序：サーマルリサイクル（最多）＞マテリアルリサイクル＞ケミカルリサイクル（最少）。選択肢④はマテリアルを最多と誤記している。","type":"incorrect"},{"year":"R6","q_num":"37","id":37,"answer":"④","explanation":"グリーンインフラは「自然の機能を活用した社会インフラ」（例：遊水地，沿岸湿地，街路樹，緑地）。「環境負荷低減の資機材・工法」という説明は環境配慮工法の説明であり，グリーンインフラの定義として誤り。","type":"incorrect"},{"year":"R6","q_num":"38","id":38,"answer":"⑤","explanation":"情報的手法は環境に関する情報を消費者・事業者に提供して自発的行動を促す手法（エコラベル，環境報告書等）。自主的取組手法は事業者が自主的に環境目標を設定・実践する手法（業界協定，自主行動計画等）。両者を混同した記述が誤り。","type":"incorrect"},{"year":"R6","q_num":"39","id":39,"answer":"③","explanation":"ISO14001等の環境マネジメントシステムは任意の認証制度であり，法的義務はない（会社法に整備義務の規定はない）。大会社への義務付けという記述は誤り。","type":"incorrect"},{"year":"R6","q_num":"40","id":40,"answer":"①","explanation":"エシカル消費・森林認証・食品期限に関する組合せ問題。正答①：ア→エコマーク、イ→第三者機関、ウ→消費（期限）。\n\n②【誤り】(ウ)の期限の種類が誤り。「定められた方法で保存した場合に安全性を欠くことがなくなるおそれのない期限」は「消費期限」。賞味期限は「定められた方法で保存した場合に期待される全ての品質が十分に保たれると認められる期限」（品質保持期限）であり、安全性ではなく品質（おいしさ）の期限。\n\n③【誤り】(ア)のシンボル・ラベルが誤り。エシカル消費の文脈で環境配慮製品を示すラベルは「エコマーク」（日本環境協会認定）。「グリーンマーク」は古紙利用製品のマーク、「エコアクション21」は事業者向け環境認証であり、消費者が選択の目安とするシンボルとは異なる。\n\n④【誤り】(イ)の森林認証の認証機関が誤り。FSC（森林管理協議会）やPEFC等の国際的な森林認証制度では、認証を行うのは「第三者機関（独立した認証機関）」である。「政府機関」や「業界団体自身」が認証するわけではない。\n\n⑤【誤り】複数項目の組合せが誤っている。正しい組合せは①のみ。\n\n①【正答】\n・ア：エコマーク（環境に配慮した製品・サービスへの第三者認証ラベル、エシカル消費の判断基準）\n・イ：第三者機関（FSC・PEFC等の独立した認証機関が森林管理の基準適合を審査）\n・ウ：消費（期限）（安全性の期限＝消費期限、品質の期限＝賞味期限）","type":"correct"},{"year":"R7","q_num":"1","id":1,"answer":"②","explanation":"BCMは委託先・調達先・供給先等のサプライチェーン全体を検討範囲に含めることが重要。「含まれない」は誤り。","type":"incorrect"},{"year":"R7","q_num":"2","id":2,"answer":"①","explanation":"管理限界（UCL・LCL）は統計的ばらつき（±3σ）から算出するものであり、製品の規格値を設定するものではない。","type":"incorrect"},{"year":"R7","q_num":"3","id":3,"answer":"④","explanation":"損益分岐点数量=640個。損益分岐点売上高=640,000円。①利益96,000円、②限界利益600円、③変動費率40%、⑤必要売上高890,000円。","type":"calc"},{"year":"R7","q_num":"4","id":4,"answer":"③","explanation":"段取り作業で停止時間を変えず作業者数のみ削減しても、OEEの三要素（時間稼働率・性能稼働率・良品率）のいずれも変化しない。","type":"incorrect"},{"year":"R7","q_num":"5","id":5,"answer":"②","explanation":"ECRSのRはRearrange（順序変更）。Reuse（再利用）ではない。","type":"incorrect"},{"year":"R7","q_num":"6","id":6,"answer":"②","explanation":"ゲーム理論は複数の意思決定主体が存在する状況を数学的に扱う方法論で、非協力ゲームと協力ゲームに大別。①モンテカルロは乱数使用、③VEはV=F/C（除算）、④線形計画の目的関数は一次式、⑤AHPは階層構造による意思決定。","type":"correct"},{"year":"R7","q_num":"7","id":7,"answer":"③","explanation":"減価償却は取得費用を各年分の必要経費として配分する手続。①財務会計は外部報告が目的、②継続性の原則は毎期見直し禁止、④機械装置・車両等も減価償却資産、⑤CF計算書は営業・投資・財務の3区分。","type":"correct"},{"year":"R7","q_num":"8","id":8,"answer":"⑤","explanation":"各経路：A→B→E→F=23日、A→C→F=23日、A→D=22日。クリティカルパス上の作業はA,B,C,E,Fの5作業。","type":"correct"},{"year":"R7","q_num":"9","id":9,"answer":"①","explanation":"労基法33条の適用範囲は自社被害だけでなく他の事業者への協力要請も含む。「対象とならない」は誤り。","type":"incorrect"},{"year":"R7","q_num":"10","id":10,"answer":"⑤","explanation":"職務内容が通常の労働者と同一な短時間労働者等には教育訓練の実施義務あり。①明示義務は努力義務でなく義務、③均等待遇は職務内容と配置変更範囲の両方が同一の場合。","type":"correct"},{"year":"R7","q_num":"11","id":11,"answer":"④","explanation":"ストレスチェック結果は実施者から直接本人に通知。事業者は本人同意なく個々の結果を取得できない。","type":"incorrect"},{"year":"R7","q_num":"12","id":12,"answer":"②","explanation":"懲戒解雇等でも受給資格要件を満たせば基本手当は支給される（給付制限期間あり）。「支給されない」は誤り。","type":"incorrect"},{"year":"R7","q_num":"13","id":13,"answer":"①","explanation":"専門職制度の導入は1980年代から大企業で始まり、1990年代後半からが主流とはいえない。時期の記述が不正確。","type":"incorrect"},{"year":"R7","q_num":"14","id":14,"answer":"②","explanation":"PM理論→C、フォロワーシップ→B、SL理論→A（状況対応できなかった）、サーバントリーダーシップ→D（共感・部下の判断尊重）。","type":"correct"},{"year":"R7","q_num":"15","id":15,"answer":"④","explanation":"メンタリングは業務の一環として就業時間内に行うのが一般的。「就業時間外が望ましい」は誤り。","type":"incorrect"},{"year":"R7","q_num":"16","id":16,"answer":"⑤","explanation":"情意考課は態度・行動の外形的観察に基づく評価であり、「内心・気持ち」を評価するものではない。","type":"incorrect"},{"year":"R7","q_num":"17","id":17,"answer":"①","explanation":"ア（倍率）=幾何平均、イ（往復速度）=調和平均、ウ（加重平均点）=算術平均。","type":"correct"},{"year":"R7","q_num":"18","id":18,"answer":"①","explanation":"肖像権は法律に明文規定がなく判例法理によって認められてきた権利。「法律上明文化された権利」は誤り。","type":"incorrect"},{"year":"R7","q_num":"19","id":19,"answer":"⑤","explanation":"MTTR_C≒68.0h < MTTR_B≒85.5h。機種CのMTTRは機種Bより小さい。①②③はMTBF比較で逆、④はMTTR比較で逆。","type":"calc"},{"year":"R7","q_num":"20","id":20,"answer":"④","explanation":"ISO/IEC 15408はIT製品のセキュリティ機能評価基準。組織面の運用・管理はISO/IEC 27001（ISMS）の対象であり混同している。","type":"incorrect"},{"year":"R7","q_num":"21","id":21,"answer":"⑤","explanation":"デザイン思考は反復的プロセス。テスト段階で問題があれば以前の段階に立ち戻ることが本質。「立ち戻らずに完了」は誤り。","type":"incorrect"},{"year":"R7","q_num":"22","id":22,"answer":"⑤","explanation":"技術革新の加速化は一般市民の社会的受容議論への参画必要性を高める。「必要性は低下」は現代の市民参画ガバナンスの考え方に反する。","type":"incorrect"},{"year":"R7","q_num":"23","id":23,"answer":"③","explanation":"社外窓口設置や多様な通報手段確保が内部通報制度の利便性向上に有効。②公益通報体制整備義務は301人以上、④通報者への処分減免制度導入は推奨。","type":"correct"},{"year":"R7","q_num":"24","id":24,"answer":"③","explanation":"VPNは境界型セキュリティの技術。ゼロトラストセキュリティ（すべてを信頼しない）の考え方とは相容れない。","type":"incorrect"},{"year":"R7","q_num":"25","id":25,"answer":"④","explanation":"4E対策はEducation・Engineering・Enforcement・Environment。「Economy」ではなく「Environment（環境）」が正しい第4のE。","type":"incorrect"},{"year":"R7","q_num":"26","id":26,"answer":"④","explanation":"労働安全衛生法の主たる義務者は「事業者」であり、「現場の管理監督者」ではない。","type":"incorrect"},{"year":"R7","q_num":"27","id":27,"answer":"③","explanation":"南海トラフ地震臨時情報（巨大地震警戒）発表後の最大警戒期間は「おおむね2週間」。「1か月間」は誤り。","type":"incorrect"},{"year":"R7","q_num":"28","id":28,"answer":"⑤","explanation":"高齢者等避難は「発生のおそれがある場合（警戒レベル3相当）」に発令する避難情報。「発生し」た後ではなく、また「指示」ではなく「呼びかけ」。","type":"incorrect"},{"year":"R7","q_num":"29","id":29,"answer":"①","explanation":"建設後50年以上経過する施設の割合が最も高いのは下水道管渠ではない。「最も高い」という順位の記述が誤り。","type":"incorrect"},{"year":"R7","q_num":"30","id":30,"answer":"④","explanation":"Safety2.0：ア（協調安全）・イ（情報共有）・エ（IoT時代）。Safety1.0：ウ（産業界固有技術・フェールセーフ）・オ（機械の分離・隔離）。","type":"correct"},{"year":"R7","q_num":"31","id":31,"answer":"①","explanation":"事業所B：度数率≒1.18、強度率≒0.035、年千人率=2.0。すべて事業所A（度数率1.5・強度率0.09・年千人率2.1）を下回っている。","type":"calc"},{"year":"R7","q_num":"32","id":32,"answer":"②","explanation":"手順の流れを細やかに確認するのはシナリオ提示型訓練。ブラインド（状況付与型）訓練は判断力向上・全体像把握に有効。②が逆の記述で誤り。","type":"incorrect"},{"year":"R7","q_num":"33","id":33,"answer":"②","explanation":"地球サミット（アジェンダ21採択）は1992年リオデジャネイロ（UNCED）。ストックホルム会議（1972年）は人間環境宣言採択。混同した記述が誤り。","type":"incorrect"},{"year":"R7","q_num":"34","id":34,"answer":"⑤","explanation":"コージェネレーションは水素等の脱炭素燃料への転換により継続・活用される方向。「段階的に縮小する取組が進められている」は誤り。","type":"incorrect"},{"year":"R7","q_num":"35","id":35,"answer":"④","explanation":"条約湿地登録自体は国内法上の追加的規制を生じさせない。①魚類も対象、②人工湿地も対象、③海域も対象、⑤農業・漁業もワイズユースに含まれる。","type":"correct"},{"year":"R7","q_num":"36","id":36,"answer":"③","explanation":"コンパクトシティは「すべての機能を1か所に・すべての居住者を集約」するものではなく、多極型・ネットワーク型も含む概念。「すべて1カ所」が過度に限定的で誤り。","type":"incorrect"},{"year":"R7","q_num":"37","id":37,"answer":"①","explanation":"典型7公害は大気汚染・水質汚濁・土壌汚染・騒音・振動・地盤沈下・悪臭の7種類。「廃棄物投棄」ではなく「悪臭」が第7の公害。","type":"incorrect"},{"year":"R7","q_num":"38","id":38,"answer":"⑤","explanation":"ALPS処理水の海洋放出によりタンク内の処理水及び処理途上水の合計量が放出前の2分の1以下になったという事実は令和7年4月1日時点では確認されていない。","type":"incorrect"},{"year":"R7","q_num":"39","id":39,"answer":"⑤","explanation":"第六次環境基本計画はウェルビーイング実現に向けて自立分散型社会経済システムへの移行を推進。「大規模集中型を維持」は計画の方向性と逆。","type":"incorrect"},{"year":"R7","q_num":"40","id":40,"answer":"④","explanation":"ISO14001は仕組みの要求事項を規定するものであり、具体的な対策内容や数値目標水準は各組織が自ら設定する。「規格が具体的対策・目標水準を示す」は誤り。","type":"incorrect"}];
const idx = {};
for (const d of allData) {
  if (!idx[d.year]) idx[d.year] = new Map();
  idx[d.year].set(d.id, d);
}
let currentYear = 'R7', rangeS = 1, rangeE = 8;
const TYPE_CFG = {
  correct:   { label:'適切',   cls:'correct'   },
  incorrect: { label:'不適切', cls:'incorrect' },
  calc:      { label:'計算',   cls:'calc'      },
};
function render() {
  const years = currentYear === 'ALL' ? Object.keys(idx).sort() : [currentYear];
  const items = [];
  for (const yr of years) {
    const map = idx[yr]; if (!map) continue;
    for (let i = rangeS; i <= rangeE; i++) { const d = map.get(i); if (d) items.push(d); }
  }
  document.getElementById('countPill').innerHTML = `<b>${items.length}</b> 問`;
  const app = document.getElementById('app');
  if (!items.length) { app.innerHTML = '<p class="empty">該当するデータがありません</p>'; return; }
  const frag = document.createDocumentFragment();
  for (const d of items) {
    const t = TYPE_CFG[d.type] || TYPE_CFG.correct;
    const card = document.createElement('div');
    card.className = 'card';
    const bodyContent = d.rich
      ? d.explanation
      : `<p class="expl">${hl(d.explanation)}</p>`;
    card.innerHTML =
      `<div class="card-head" role="button" tabindex="0" aria-expanded="false">
        <div class="card-meta">
          <div class="card-id">${d.year}&nbsp;I-1-${d.q_num}</div>
          <div class="card-qrow">
            <span class="card-qnum">問 ${d.q_num}</span>
            <span class="type-badge ${t.cls}">${t.label}</span>
          </div>
        </div>
        <div class="ans-box"><div class="ans-circle ${t.cls}">${d.answer}</div></div>
        <span class="chevron">▾</span>
      </div>
      <div class="card-body">${bodyContent}</div>`;
    const head = card.querySelector('.card-head');
    const toggle = () => { const o = card.classList.toggle('open'); head.setAttribute('aria-expanded', o); };
    head.addEventListener('click', toggle);
    head.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' '){e.preventDefault();toggle();} });
    frag.appendChild(card);
  }
  app.innerHTML = '';
  app.appendChild(frag);
  window.scrollTo({ top:0, behavior:'smooth' });
}
function hl(t) {
  return (t||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/[①②③④⑤]/g, m=>`<span class="hi">${m}</span>`);
}
document.getElementById('yearRow').addEventListener('click', e => {
  const btn = e.target.closest('.chip'); if (!btn) return;
  document.querySelectorAll('#yearRow .chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); currentYear = btn.dataset.year; render();
});
document.getElementById('rangeRow').addEventListener('click', e => {
  const btn = e.target.closest('.rchip'); if (!btn) return;
  document.querySelectorAll('#rangeRow .rchip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); rangeS=parseInt(btn.dataset.s); rangeE=parseInt(btn.dataset.e); render();
});
const topBtn = document.getElementById('topBtn');
window.addEventListener('scroll', ()=>topBtn.classList.toggle('show', window.scrollY>200));
topBtn.addEventListener('click', ()=>window.scrollTo({top:0,behavior:'smooth'}));
render();
</script>
</body>
</html>
